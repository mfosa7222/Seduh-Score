<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brunei Barista Team Championship</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --am:#CF8A10;--am-bg:rgba(207,138,16,.11);--am-bd:rgba(207,138,16,.38);
  --bl:#185FA5;--bl-bg:rgba(24,95,165,.1);--bl-bd:rgba(24,95,165,.35);
  --gn:#0F6E56;--gn-bg:#E1F5EE;--gn-bd:#5DCAA5;
  --bg:#f7f5f2;--surface:#fff;--border:#e4e0da;--border2:#ede9e3;
  --txt:#1a1510;--txt2:#6b5f50;--txt3:#9c8f80;
  --rad:8px;--rad-s:5px;
  font-family:'Georgia',serif;
}
body{background:var(--bg);color:var(--txt);min-height:100vh}
input,select,button{font-family:inherit}
.app{max-width:860px;margin:0 auto;padding:0 0 40px}
/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:1rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.hdr-ac{width:3px;height:38px;background:var(--am);border-radius:2px;flex-shrink:0}
.hdr-s{font-size:10px;color:var(--am);letter-spacing:.18em;text-transform:uppercase;margin-bottom:2px}
.hdr-t{font-size:16px;font-weight:normal;letter-spacing:.01em}
.badge{background:var(--am-bg);border:1px solid var(--am-bd);border-radius:var(--rad-s);padding:3px 10px;font-size:11px;color:var(--am);white-space:nowrap}
.btn-pub{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--am-bd);border-radius:var(--rad-s);background:var(--am-bg);font-size:12px;cursor:pointer;color:var(--am);font-weight:bold}
.btn-pub:hover{background:var(--am);color:#fff}
.btn-exp{border-color:var(--bl-bd);background:var(--bl-bg);color:var(--bl)}
.btn-exp:hover{background:var(--bl);color:#fff}
/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem}
.tbtn{padding:.55rem .9rem;border:none;background:transparent;font-size:12px;cursor:pointer;color:var(--txt3);border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.04em;text-transform:uppercase}
.tbtn.on{color:var(--am);border-bottom-color:var(--am);font-weight:bold}
/* Body */
.body{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem}
/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden}
.ch{padding:.5rem 1rem;border-bottom:1px solid var(--border2);font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;background:var(--bg)}
.cb{padding:1rem}
/* Round buttons */
.rbg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.rb{padding:5px 14px;border:1px solid var(--border);border-radius:var(--rad-s);background:transparent;font-size:12px;cursor:pointer;color:var(--txt2)}
.rb.on{border-color:var(--am);background:var(--am-bg);color:var(--am);font-weight:bold}
/* Info strip */
.inf{display:flex;gap:1.5rem;padding:.5rem 1rem;background:var(--bg);border-radius:var(--rad-s);margin-top:8px}
.sv{font-size:14px;font-weight:bold;color:var(--am)}.sl{font-size:10px;color:var(--txt3)}
/* Inputs */
.ir{display:flex;gap:8px}.ir input{flex:1}
input[type=text],input[type=number],select{border:1px solid var(--border);border-radius:var(--rad-s);padding:7px 10px;font-size:13px;background:var(--surface);color:var(--txt);outline:none;width:100%}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--am)}
/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{display:flex;align-items:center;gap:5px;padding:4px 9px 4px 11px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rad-s);font-size:13px}
.cn{font-size:10px;color:var(--txt3);margin-right:1px}
.cx{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:15px;line-height:1;padding:0}
/* Buttons */
.btn-p{background:var(--am);color:#fff;border:none;padding:8px 20px;border-radius:var(--rad-s);font-size:13px;font-weight:bold;cursor:pointer}
.btn-p:disabled{background:var(--border);color:var(--txt3);cursor:default}
.btn-o{background:transparent;border:1px solid var(--border);padding:6px 14px;border-radius:var(--rad-s);font-size:12px;cursor:pointer;color:var(--txt2)}
.btn-sc{background:var(--am-bg);border:1px solid var(--am-bd);padding:5px 12px;border-radius:var(--rad-s);font-size:11px;cursor:pointer;color:var(--am);font-weight:bold}
.btn-ed{background:transparent;border:1px solid var(--border);padding:5px 12px;border-radius:var(--rad-s);font-size:11px;cursor:pointer;color:var(--txt2)}
.btn-rst{font-size:11px;padding:5px 10px;color:#A32D2D;border-color:#F09595}
.hint{font-size:12px;color:var(--txt3)}
/* Create form */
.cf{background:var(--bg);border:1px solid var(--am-bd);border-radius:var(--rad);padding:1.1rem;margin-bottom:.75rem}
.cf-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.cf-lbl{font-size:11px;color:var(--txt3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em;display:block}
/* Judge pills */
.jpool{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.jpill{display:flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid var(--border);border-radius:var(--rad-s);font-size:12px;cursor:pointer;background:var(--surface);color:var(--txt2)}
.jpill.on{border-color:var(--am);background:var(--am-bg);color:var(--am);font-weight:bold}
.jpill.dim{opacity:.3;cursor:default;pointer-events:none}
.jpick{width:12px;height:12px;border-radius:2px;border:1.5px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.jpill.on .jpick::after{content:'✓';font-size:8px;line-height:1;font-weight:700}
/* Match cards */
.mc{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--am);border-radius:0 var(--rad) var(--rad) 0;padding:.8rem 1rem;display:flex;align-items:center;gap:10px}
.mc.done{border-left-color:var(--gn)}
.mn{font-size:10px;color:var(--txt3);width:22px;flex-shrink:0}
.mt{flex:1;min-width:0;overflow:hidden}
.mtn{font-size:13px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mts{font-size:18px;line-height:1.1}
.mvs{font-size:10px;color:var(--txt3);letter-spacing:.12em;padding:0 5px;flex-shrink:0}
.m-rb{font-size:9px;padding:2px 7px;border-radius:var(--rad-s);border:1px solid var(--border);color:var(--txt3);background:var(--bg);white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.05em}
.res{font-size:10px;color:var(--gn);background:var(--gn-bg);border:1px solid var(--gn-bd);border-radius:var(--rad-s);padding:2px 8px;white-space:nowrap;font-weight:bold}
/* History */
.hr-row{display:flex;align-items:center;gap:8px;padding:.7rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);flex-wrap:wrap}
.hr-rb{font-size:10px;color:var(--txt3);background:var(--bg);border:1px solid var(--border);border-radius:var(--rad-s);padding:2px 7px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.05em}
.hr-t{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.hr-t.w{font-weight:bold;color:var(--am)}
.hr-s{font-size:18px;flex-shrink:0}
.hvs{font-size:10px;color:var(--txt3);padding:0 3px;flex-shrink:0}
.hr-time{font-size:10px;color:var(--txt3);background:var(--bg);border:1px solid var(--border);border-radius:var(--rad-s);padding:2px 8px;white-space:nowrap;flex-shrink:0}
/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:.7rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--rad)}
.lb-row.qf{background:#E1F5EE;border-color:var(--gn-bd)}
.lb-row.qf .lb-name{color:#085041;font-weight:bold}
.lb-row.qf .lb-rec{color:#0F6E56}
.lb-row.qf .lb-rec span{color:#3aA080}
.rnk{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.r1{background:#EF9F27;color:#3a1800}.r2{background:#9E9E9E;color:#fff}.r3{background:#A0694E;color:#fff}.ro{background:var(--bg);color:var(--txt3);border:1px solid var(--border)}
.lb-name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-rec{text-align:center;font-size:11px;flex-shrink:0;color:var(--txt)}
.lb-rec span{display:block;font-size:10px;color:var(--txt3)}
.lb-pts{text-align:right;flex-shrink:0}
.lb-pn{font-size:22px;color:var(--am);line-height:1;font-weight:bold}
.lb-pl{font-size:10px;color:var(--txt3)}
.qf-tag{font-size:10px;color:var(--gn);background:var(--gn-bg);border:1px solid var(--gn-bd);border-radius:var(--rad-s);padding:2px 8px;white-space:nowrap;flex-shrink:0;font-weight:bold}
.cutline{display:flex;align-items:center;gap:8px;padding:.3rem .5rem;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em}
.cutline::before,.cutline::after{content:'';flex:1;height:1px;background:var(--border)}
.empty{text-align:center;padding:3rem 1rem;color:var(--txt3);font-size:13px}
/* Scoring */
.sc-hdr{display:flex;align-items:center;gap:10px;padding:.8rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.sc-meta{display:flex;align-items:stretch;gap:10px;padding:.85rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg)}
.sc-time-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rad-s);padding:.6rem .85rem}
.sc-time-lbl{font-size:10px;font-weight:bold;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.sc-time-lbl.t1{color:var(--am)}.sc-time-lbl.t2{color:var(--bl)}
.sc-time-box input{width:100%;background:transparent;border:none;outline:none;font-size:15px;font-weight:bold;color:var(--txt)}
.sc-tok{align-self:center;padding:.5rem 1rem;border-radius:var(--rad-s);border:1px solid var(--border);font-size:11px;text-align:center;background:var(--surface);white-space:nowrap;flex-shrink:0}
.sc-tok.warn{color:#A32D2D;border-color:#F09595;background:#FCEBEB}
/* Score grid */
.scu-wrap{padding:.85rem 1.5rem 0}
.scu{border:1px solid var(--border);border-radius:var(--rad);overflow:hidden}
.scu-hdr-row,.scu-row,.scu-tot-row{display:grid;grid-template-columns:36px 1fr 1fr}
.scu-hdr-row>div{padding:.45rem .6rem;background:var(--bg);font-size:12px;font-weight:bold;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scu-hdr-row>.dl{text-align:left;font-size:11px;color:var(--txt3);font-weight:normal}
.scu-hdr-row>.h1{color:var(--am);border-bottom:2px solid var(--am)}
.scu-hdr-row>.h2{color:var(--bl);border-bottom:2px solid var(--bl)}
.scu-body{overflow-y:auto;max-height:340px}
.scu-body::-webkit-scrollbar{width:3px}
.scu-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.scu-row>div{padding:.24rem .4rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:center}
.scu-row:nth-child(odd)>div{background:var(--bg)}
.scu-row:last-child>div{border-bottom:none}
.scu-row .dl{font-size:10px;color:var(--txt3);justify-content:flex-start;padding-left:.6rem}
.btn-grp{display:flex;gap:3px}
.sb{width:36px;height:32px;border-radius:var(--rad-s);border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:bold;color:var(--txt2)}
.sb:disabled{opacity:.2;cursor:default}
.sb.a-on{background:var(--am);border-color:var(--am);color:#fff}
.sb.b-on{background:var(--bl);border-color:var(--bl);color:#fff}
.scu-tot-row>div{padding:.45rem .6rem;background:var(--bg);border-top:1px solid var(--border);text-align:center;font-size:16px;font-weight:bold}
.scu-tot-row .dl{font-size:11px;color:var(--txt3);font-weight:normal;text-align:left;padding-left:.6rem;display:flex;align-items:center}
.scu-tot-row .t1v{color:var(--am)}.scu-tot-row .t2v{color:var(--bl)}
/* Bonus panels */
.sc-bonuses{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:1rem 1.5rem 0}
.sc-bp{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden}
.sc-bp-h{padding:.45rem .9rem;font-size:11px;font-weight:bold;border-bottom:1px solid var(--border2);background:var(--bg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.06em}
.sc-bp-h.t1{color:var(--am)}.sc-bp-h.t2{color:var(--bl)}
.sc-bp-b{padding:.65rem .9rem;display:flex;flex-direction:column;gap:6px}
.brow{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:var(--rad-s);cursor:pointer}
.brow.auto{cursor:default}
.brow.on.t1{background:var(--am-bg)}.brow.on.t2{background:var(--bl-bg)}
.chk{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.on.t1{background:var(--am);border-color:var(--am)}.chk.on.t2{background:var(--bl);border-color:var(--bl)}
.chk.on::after{content:'✓';color:#fff;font-size:9px;line-height:1;font-weight:700}
.bn{flex:1;font-size:12px;color:var(--txt2)}.brow.on .bn{color:var(--txt)}
.bpts-t1{font-size:12px;font-weight:bold;color:var(--am)}.bpts-t2{font-size:12px;font-weight:bold;color:var(--bl)}
/* Grand totals */
.sc-tots{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;padding:1rem 1.5rem 0}
.sc-tot{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:.75rem 1rem;text-align:center}
.sc-tot-name{font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.sc-tot-n{font-size:32px;line-height:1.1}
.sc-tot-n.t1{color:var(--am)}.sc-tot-n.t2{color:var(--bl)}
.sc-tot-sub{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em}
/* Audience overlay — light theme */
#aud-overlay{display:none;position:fixed;inset:0;z-index:999;background:#f0ece4;overflow:hidden;flex-direction:column}
#aud-overlay.show{display:flex}
.aud-banner{display:flex;align-items:center;gap:14px;padding:.9rem 2rem;background:#fff;border-bottom:3px solid #CF8A10;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.aud-ac{width:4px;height:42px;background:#CF8A10;border-radius:2px;flex-shrink:0}
.aud-sub{font-size:10px;color:#CF8A10;letter-spacing:.25em;text-transform:uppercase;margin-bottom:3px}
.aud-title{font-size:20px;color:#1a1510;letter-spacing:.03em}
.aud-ts{margin-left:auto;text-align:right;font-size:11px;color:#9c8f80;line-height:1.6}
.aud-close{background:#f0ece4;border:1px solid #d0c8bc;color:#6b5f50;font-size:12px;font-weight:bold;padding:7px 16px;border-radius:6px;cursor:pointer;flex-shrink:0;text-transform:uppercase;letter-spacing:.08em}
.aud-close:hover{background:#CF8A10;color:#fff;border-color:#CF8A10}
.aud-body{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}
.aud-panel{overflow-y:auto;padding:1.5rem 1.75rem;background:#f0ece4}
.aud-panel:first-child{border-right:1px solid #d8d0c6}
.aud-panel::-webkit-scrollbar{width:3px}
.aud-panel::-webkit-scrollbar-thumb{background:#d0c8bc;border-radius:2px}
.aud-sec-title{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:#CF8A10;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:2px solid #CF8A10}
.aud-lb-row{display:flex;align-items:center;gap:12px;padding:.9rem 1.1rem;border-radius:8px;margin-bottom:8px;border:1px solid #d8d0c6;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.aud-lb-row.qf{background:#edf8f2;border-color:#5DCAA5;border-left:4px solid #0F6E56}
.aud-rnk{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;flex-shrink:0}
.aud-name{flex:1;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1510}
.aud-lb-row.qf .aud-name{color:#085041;font-weight:bold}
.aud-rec{text-align:center;font-size:12px;color:#9c8f80;flex-shrink:0;line-height:1.5}
.aud-pts-wrap{text-align:right;flex-shrink:0}
.aud-pts{font-size:28px;color:#CF8A10;line-height:1;font-weight:bold}
.aud-ptsl{font-size:9px;color:#9c8f80;text-transform:uppercase;letter-spacing:.12em;text-align:right}
.aud-qf-pill{font-size:10px;background:#E1F5EE;border:1px solid #5DCAA5;color:#0F6E56;border-radius:4px;padding:3px 9px;white-space:nowrap;flex-shrink:0;font-weight:bold}
.aud-cut{display:flex;align-items:center;gap:8px;padding:.35rem 0;margin:.25rem 0;font-size:9px;color:#9c8f80;letter-spacing:.15em;text-transform:uppercase}
.aud-cut::before,.aud-cut::after{content:'';flex:1;height:1px;background:#d8d0c6}
.aud-h-row{display:flex;align-items:center;gap:8px;padding:.75rem 1rem;background:#fff;border:1px solid #d8d0c6;border-radius:8px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.aud-h-rb{font-size:9px;background:#f0ece4;border:1px solid #d8d0c6;color:#9c8f80;border-radius:4px;padding:2px 8px;flex-shrink:0;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.aud-h-time{font-size:10px;background:#f0ece4;border:1px solid #d8d0c6;color:#9c8f80;border-radius:4px;padding:2px 8px;flex-shrink:0;white-space:nowrap}
/* PDF / Print overlay */
#pdf-overlay{display:none;position:fixed;inset:0;z-index:1000;background:#e8e4de;overflow-y:auto;flex-direction:column}
#pdf-overlay.show{display:flex}
.pdf-toolbar{display:flex;align-items:center;gap:10px;padding:.85rem 2rem;background:#fff;border-bottom:2px solid #CF8A10;flex-shrink:0;position:sticky;top:0;z-index:10;flex-wrap:wrap}
.pdf-toolbar-title{font-size:14px;font-weight:bold;flex:1}
.pdf-toolbar-hint{font-size:12px;color:#9c8f80}
.btn-print{background:#CF8A10;color:#fff;border:none;padding:8px 20px;border-radius:5px;font-size:13px;font-weight:bold;cursor:pointer}
.btn-print:hover{background:#b07a0e}
.pdf-page{width:210mm;min-height:297mm;background:#fff;margin:1.5rem auto;padding:16mm 16mm 14mm;box-shadow:0 2px 20px rgba(0,0,0,.12);font-family:'Georgia',serif;color:#1a1510;page-break-after:always}
.pdf-page:last-child{page-break-after:auto}
.pdf-logo-row{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:3px solid #CF8A10;padding-bottom:10px;margin-bottom:18px}
.pdf-event-name{font-size:22px;letter-spacing:.03em;line-height:1.2}
.pdf-event-sub{font-size:10px;color:#CF8A10;letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px}
.pdf-meta{text-align:right;font-size:11px;color:#9c8f80;line-height:1.8}
.pdf-section-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#CF8A10;border-bottom:1px solid #e4e0da;padding-bottom:5px;margin:20px 0 12px}
.pdf-lb-table{width:100%;border-collapse:collapse;font-size:12px}
.pdf-lb-table th{text-align:left;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#9c8f80;padding:5px 8px;border-bottom:1px solid #e4e0da;font-weight:normal}
.pdf-lb-table th:last-child,.pdf-lb-table td:last-child{text-align:right}
.pdf-lb-table td{padding:7px 8px;border-bottom:1px solid #ede9e3;vertical-align:middle}
.pdf-lb-table tr.qf td{background:#f0fbf6}
.pdf-lb-table tr.cutrow td{border-bottom:2px dashed #5DCAA5}
.pdf-lb-table tr.cutlabel td{font-size:9px;color:#5DCAA5;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid #ede9e3}
.pdf-rank{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold}

<body>
<div class="app" id="app"></div>

<div id="aud-overlay">
  <div class="aud-banner">
    <div class="aud-ac"></div>
    <div><div class="aud-sub">Brunei</div><div class="aud-title">Barista Team Championship</div></div>
    <div class="aud-ts" id="aud-ts"></div>
    <button class="aud-close" id="aud-close">✕ Close</button>
  </div>
  <div class="aud-body">
    <div class="aud-panel"><div class="aud-sec-title">Leaderboard</div><div id="aud-lb"></div></div>
    <div class="aud-panel"><div class="aud-sec-title">Match results</div><div id="aud-hist"></div></div>
  </div>
</div>

<div id="pdf-overlay">
  <div class="pdf-toolbar">
    <div class="pdf-toolbar-title">📄 Export Preview</div>
    <span class="pdf-toolbar-hint">Print dialog → Destination: <strong>Save as PDF</strong> · Paper: <strong>A4</strong></span>
    <button class="btn-print" id="pdf-print">🖨 Print / Save PDF</button>
    <button class="btn-o" id="pdf-close" style="margin-left:4px">✕ Close</button>
  </div>
  <div id="pdf-content"></div>
</div>

<script>
const RC={
  preliminary:   {label:'Preliminary',   drinks:15, time:'10 min', maxJ:45},
  quarterfinals: {label:'Quarter Finals', drinks:20, time:'15 min', maxJ:60},
  semifinals:    {label:'Semi Finals',    drinks:20, time:'15 min', maxJ:60},
  finals:        {label:'Finals',         drinks:20, time:'15 min', maxJ:60}
};
const isPre = r => r === 'preliminary';
const mkMatch = n => ({
  drinks: Array.from({length:n}, () => [0,0]),
  s1: {fastest:false, sigBev:false},
  s2: {fastest:false, sigBev:false},
  t1time:'', t2time:''
});
const jPts1  = m => m.drinks.reduce((a,r) => a + r[0], 0);
const jPts2  = m => m.drinks.reduce((a,r) => a + r[1], 0);
const tokUsed= m => m.drinks.reduce((a,r) => a + r[0] + r[1], 0);

// Winner bonus is automatic: team with more judge tokens gets +5
const t1Tot = m => {
  const p1=jPts1(m), p2=jPts2(m);
  return p1 + (m.s1.fastest?2:0) + (p1>p2?5:0) + (!isPre(m.round)&&m.s1.sigBev?2:0);
};
const t2Tot = m => {
  const p1=jPts1(m), p2=jPts2(m);
  return p2 + (m.s2.fastest?2:0) + (p2>p1?5:0) + (!isPre(m.round)&&m.s2.sigBev?2:0);
};

const STORE_KEY = 'bbtc_v2';
let mid=0, jid=0;
let S = {
  judges:[], teams:[], matches:[],
  tab:'setup', sid:null, creating:false,
  nm:{t1:'',t2:'',round:'preliminary',jids:[]},
  qfSlots:4,
  eventDate:'', eventVenue:''
};

function saveState(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify({
      judges:S.judges, teams:S.teams, matches:S.matches,
      qfSlots:S.qfSlots, mid, jid,
      eventDate:S.eventDate, eventVenue:S.eventVenue
    }));
  }catch(e){}
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    S.judges     = d.judges    || [];
    S.teams      = d.teams     || [];
    S.matches    = d.matches   || [];
    S.qfSlots    = d.qfSlots   || 4;
    S.eventDate  = d.eventDate || '';
    S.eventVenue = d.eventVenue|| '';
    mid = d.mid || 0;
    jid = d.jid || 0;
  }catch(e){}
}
loadState();

/* ── Computed leaderboard ── */
function calcLB(){
  return S.teams.map(t => {
    let pts=0, played=0, wins=0;
    S.matches.filter(m=>m.done).forEach(m => {
      if(m.t1===t){const p=t1Tot(m),q=t2Tot(m);pts+=p;played++;if(p>q)wins++;}
      if(m.t2===t){const p=t2Tot(m),q=t1Tot(m);pts+=p;played++;if(p>q)wins++;}
    });
    return {t,pts,played,wins};
  }).sort((a,b) => b.pts-a.pts || b.wins-a.wins);
}

/* ── PDF export ── */
function generatePDF(){
  const lb   = calcLB();
  const done = S.matches.filter(m=>m.done);
  const now  = new Date();
  const dateStr = now.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const timeStr = now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const eventMeta = [S.eventDate, S.eventVenue].filter(Boolean).join(' · ');

  const rnkCls = i => i===0?'pdf-r1':i===1?'pdf-r2':i===2?'pdf-r3':'pdf-ro';
  const lbRows = lb.map((s,i) => {
    const isQF   = (i+1) <= S.qfSlots;
    const showCut= i === S.qfSlots-1 && S.qfSlots < lb.length;
    const row = `<tr class="${isQF?'qf':''}${showCut?' cutrow':''}">
      <td><span class="pdf-rank ${rnkCls(i)}">${i+1}</span></td>
      <td>${s.t}${isQF?'<span class="pdf-qf-pip">QF ✓</span>':''}</td>
      <td style="text-align:center">${s.played>0?s.wins+'W / '+(s.played-s.wins)+'L':'—'}</td>
      <td style="text-align:center">${s.played}</td>
      <td style="text-align:right"><span class="pdf-pts">${s.pts}</span></td>
    </tr>`;
    const cut = showCut
      ? '<tr class="cutlabel"><td colspan="5">▲ Quarter Finals qualifiers above this line</td></tr>' : '';
    return row+cut;
  }).join('');

  const roundOrder = ['preliminary','quarterfinals','semifinals','finals'];
  const byRound = {};
  done.forEach(m => { (byRound[m.round]=byRound[m.round]||[]).push(m); });
  const resultsHTML = roundOrder.filter(r=>byRound[r]).map(r =>
    byRound[r].map(m => {
      const v1=t1Tot(m), v2=t2Tot(m), w=v1>v2?1:v2>v1?2:0;
      return `<tr>
        <td><span class="pdf-rb">${RC[r].label}</span></td>
        <td class="${w===1?'pdf-win':''}">${m.t1}</td>
        <td style="text-align:center"><span class="pdf-score${w===1?' w':''}">${v1}</span></td>
        <td style="text-align:center;color:#9c8f80;font-size:11px">${w===0?'draw':'vs'}</td>
        <td style="text-align:center"><span class="pdf-score${w===2?' w':''}">${v2}</span></td>
        <td class="${w===2?'pdf-win':''}" style="text-align:right">${m.t2}</td>
        <td class="pdf-time-cell">${(m.t1time||m.t2time)?m.t1time+' / '+m.t2time:''}</td>
      </tr>`;
    }).join('')
  ).join('');

  const footer = `<div class="pdf-footer">
    <span>Brunei Barista Team Championship${S.eventVenue?' · '+S.eventVenue:''}</span>
    <span>Exported ${dateStr} at ${timeStr}</span>
  </div>`;
  const logoSub = eventMeta ? `<div style="font-size:11px;color:#9c8f80;margin-top:5px">${eventMeta}</div>` : '';

  document.getElementById('pdf-content').innerHTML = `
  <div class="pdf-page">
    <div class="pdf-logo-row">
      <div><div class="pdf-event-sub">Brunei</div><div class="pdf-event-name">Barista Team Championship</div>${logoSub}</div>
      <div class="pdf-meta"><div>Official Results</div><div>${dateStr}</div><div style="color:#CF8A10">QF Spots: Top ${S.qfSlots}</div></div>
    </div>
    <div class="pdf-section-title">Final Standings</div>
    <table class="pdf-lb-table">
      <thead><tr><th>#</th><th>Team</th><th style="text-align:center">Record</th><th style="text-align:center">Played</th><th style="text-align:right">Points</th></tr></thead>
      <tbody>${lbRows||'<tr><td colspan="5" style="text-align:center;color:#9c8f80;padding:20px">No teams registered.</td></tr>'}</tbody>
    </table>${footer}
  </div>
  <div class="pdf-page">
    <div class="pdf-logo-row">
      <div><div class="pdf-event-sub">Brunei</div><div class="pdf-event-name">Barista Team Championship</div>${logoSub}</div>
      <div class="pdf-meta"><div>Match Results</div><div>${dateStr}</div><div>${done.length} matches completed</div></div>
    </div>
    <div class="pdf-section-title">Match Results</div>
    <table class="pdf-res-table">
      <thead><tr>
        <th>Round</th><th>Team 1</th>
        <th style="text-align:center">Score</th><th style="text-align:center"></th>
        <th style="text-align:center">Score</th><th style="text-align:right">Team 2</th>
        <th style="text-align:center">Time</th>
      </tr></thead>
      <tbody>${resultsHTML||'<tr><td colspan="7" style="text-align:center;color:#9c8f80;padding:20px">No completed matches yet.</td></tr>'}</tbody>
    </table>${footer}
  </div>`;

  document.getElementById('pdf-overlay').classList.add('show');
}

/* ── CSV export ── */
function generateCSV(){
  const esc = v => {
    const s = String(v==null?'':v);
    return (s.includes(',') || s.includes('"') || s.includes('\n'))
      ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  const row = cols => cols.map(esc).join(',');

  const lines = [];
  const eventMeta = [S.eventDate, S.eventVenue].filter(Boolean).join(' | ');
  lines.push(row(['Brunei Barista Team Championship', eventMeta]));
  lines.push('');

  // ── Sheet 1: Leaderboard ──
  lines.push(row(['LEADERBOARD']));
  lines.push(row(['Rank','Team','Wins','Losses','Played','Total Points','QF Qualified']));
  const lb = calcLB();
  lb.forEach((s,i) => {
    lines.push(row([
      i+1, s.t, s.wins, s.played-s.wins, s.played, s.pts,
      (i+1)<=S.qfSlots ? 'Yes' : 'No'
    ]));
  });
  lines.push('');

  // ── Sheet 2: Match Summary ──
  lines.push(row(['MATCH RESULTS']));
  lines.push(row(['Match','Round','Team 1','Team 1 Judge Pts','Team 1 Fastest','Team 1 Winner','Team 1 Sig Bev','Team 1 Total','Team 1 Time',
                  'Team 2','Team 2 Judge Pts','Team 2 Fastest','Team 2 Winner','Team 2 Sig Bev','Team 2 Total','Team 2 Time','Result']));
  S.matches.filter(m=>m.done).forEach((m,i) => {
    const p1=jPts1(m), p2=jPts2(m);
    const aw1=p1>p2, aw2=p2>p1;
    const v1=t1Tot(m), v2=t2Tot(m);
    const w = v1>v2?m.t1 : v2>v1?m.t2 : 'Draw';
    lines.push(row([
      'M'+(i+1), RC[m.round].label,
      m.t1, p1, m.s1.fastest?'Yes':'No', aw1?'Yes':'No', m.s1.sigBev?'Yes':'No', v1, m.t1time||'',
      m.t2, p2, m.s2.fastest?'Yes':'No', aw2?'Yes':'No', m.s2.sigBev?'Yes':'No', v2, m.t2time||'',
      w
    ]));
  });
  lines.push('');

  // ── Sheet 3: Full Cup-by-Cup Data ──
  lines.push(row(['CUP-BY-CUP SCORES']));
  S.matches.filter(m=>m.done).forEach((m,i) => {
    lines.push('');
    lines.push(row(['Match M'+(i+1), RC[m.round].label, m.t1+' vs '+m.t2]));
    lines.push(row(['Cup','Team 1 Tokens','Team 2 Tokens','Cup Total','Team Leading Cup']));
    m.drinks.forEach((d,di) => {
      const t1v=d[0], t2v=d[1], tot=t1v+t2v;
      const leader = t1v>t2v?m.t1 : t2v>t1v?m.t2 : tot===0?'No tokens':'Tied';
      lines.push(row(['D'+(di+1), t1v, t2v, tot, leader]));
    });
    lines.push(row(['TOTALS', jPts1(m), jPts2(m), jPts1(m)+jPts2(m), '']));
  });

  // Download
  const csv  = lines.join('\r\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const fname= 'BBTC_Results_'+(S.eventDate||new Date().toISOString().slice(0,10)).replace(/\s/g,'_')+'.csv';
  a.href=url; a.download=fname; a.click();
  URL.revokeObjectURL(url);
}


function showAudience(){
  const lb   = calcLB();
  const done = [...S.matches.filter(m=>m.done)].reverse();
  const now  = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('aud-ts').innerHTML = 'Audience view<br>'+now;

  const rnkSt = i => i===0 ? 'background:#CF8A10;color:#fff'
                   : i===1 ? 'background:#9E9E9E;color:#fff'
                   : i===2 ? 'background:#A0694E;color:#fff'
                   : 'background:#e8e4de;color:#9c8f80;border:1px solid #d0c8bc';

  document.getElementById('aud-lb').innerHTML = lb.length
    ? lb.map((s,i) => {
        const isQF=(i+1)<=S.qfSlots, showCut=i===S.qfSlots-1&&S.qfSlots<lb.length;
        return `<div class="aud-lb-row${isQF?' qf':''}">
  <div class="aud-rnk" style="${rnkSt(i)}">${i+1}</div>
  <div class="aud-name">${s.t}</div>
  ${s.played>0?`<div class="aud-rec">${s.wins}W/${s.played-s.wins}L<br><span style="font-size:10px">${s.played} played</span></div>`:''}
  <div class="aud-pts-wrap"><div class="aud-pts">${s.pts}</div><div class="aud-ptsl">pts</div></div>
  ${isQF?'<div class="aud-qf-pill">QF ✓</div>':'<div style="width:48px"></div>'}
</div>${showCut?`<div class="aud-cut">QF cut — top ${S.qfSlots} advance</div>`:''}`;
      }).join('')
    : '<div style="text-align:center;padding:2.5rem;color:#9c8f80">No teams yet.</div>';

  document.getElementById('aud-hist').innerHTML = done.length
    ? done.map(m => {
        const v1=t1Tot(m),v2=t2Tot(m),w=v1>v2?1:v2>v1?2:0;
        const c1=w===1?'#CF8A10':'#6b5f50', c2=w===2?'#CF8A10':'#6b5f50';
        const fw1=w===1?'bold':'normal', fw2=w===2?'bold':'normal';
        return `<div class="aud-h-row">
  <div class="aud-h-rb">${RC[m.round].label}</div>
  <div style="flex:1;font-size:14px;font-weight:${fw1};color:${c1};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.t1}</div>
  <div style="font-size:23px;font-weight:bold;color:${c1};flex-shrink:0">${v1}</div>
  <div style="font-size:11px;color:#9c8f80;padding:0 4px;flex-shrink:0">${w===0?'draw':'vs'}</div>
  <div style="font-size:23px;font-weight:bold;color:${c2};flex-shrink:0">${v2}</div>
  <div style="flex:1;font-size:14px;font-weight:${fw2};color:${c2};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right">${m.t2}</div>
  ${(m.t1time||m.t2time)?`<div class="aud-h-time">⏱ ${m.t1time||'—'} / ${m.t2time||'—'}</div>`:''}
</div>`;
      }).join('')
    : '<div style="text-align:center;padding:2.5rem;color:#9c8f80">No results yet.</div>';

  document.getElementById('aud-overlay').classList.add('show');
}

/* ── Render ── */
function render(){
  saveState();
  document.getElementById('app').innerHTML = S.sid !== null ? rScoring() : rMain();
  bind();
}

function rMain(){
  const done = S.matches.filter(m=>m.done).length;
  return `<div class="hdr">
  <div class="hdr-ac"></div>
  <div><div class="hdr-s">Brunei</div><div class="hdr-t">Barista Team Championship</div></div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <button class="btn-pub" id="pubview">📺 Audience</button>
    <button class="btn-pub btn-exp" id="exportbtn">📄 Export PDF</button>
    <button class="btn-pub" id="csvbtn" style="border-color:rgba(15,110,86,.4);background:rgba(15,110,86,.08);color:#0F6E56">📊 Export CSV</button>
    <button class="btn-o btn-rst" id="resetbtn">↺ Reset</button>
    <div class="badge">${done}/${S.matches.length} complete</div>
  </div>
</div>
<div class="tabs">
${[['setup','Setup'],['matches','Matches ('+S.matches.length+')'],['history','History'],['leaderboard','Leaderboard']]
  .map(([t,l]) => `<button class="tbtn${S.tab===t?' on':''}" data-tab="${t}">${l}</button>`).join('')}
</div>
<div class="body">${S.tab==='setup'?rSetup():S.tab==='matches'?rMatches():S.tab==='history'?rHistory():rLeaderboard()}</div>`;
}

function rSetup(){
  return `<div class="card"><div class="ch">Event info <span style="font-weight:normal;text-transform:none;letter-spacing:0;font-size:9px">(optional)</span></div><div class="cb">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div><label class="cf-lbl">Date</label><input id="evdate" type="text" value="${S.eventDate}" placeholder="e.g. 14 June 2025"/></div>
    <div><label class="cf-lbl">Venue</label><input id="evvenue" type="text" value="${S.eventVenue}" placeholder="e.g. Hua Ho Mall Manggis"/></div>
  </div>
</div></div>
<div class="card"><div class="ch">Teams — ${S.teams.length} registered</div><div class="cb">
  <div class="ir"><input id="tinp" type="text" placeholder="Team name…" style="width:auto"/><button class="btn-p" id="addt">Add</button></div>
  ${S.teams.length
    ? '<div class="chips">'+S.teams.map((t,i)=>`<div class="chip"><span class="cn">${i+1}</span><span>${t}</span><button class="cx" data-rmt="${t}">×</button></div>`).join('')+'</div>'
    : '<p class="hint" style="margin-top:10px">No teams yet.</p>'}
</div></div>
<div class="card"><div class="ch">Judge pool — ${S.judges.length} judges</div><div class="cb">
  <div class="ir"><input id="jinp" type="text" placeholder="Judge name…" style="width:auto"/><button class="btn-p" id="addj">Add</button></div>
  ${S.judges.length
    ? '<div class="chips" style="margin-top:10px">'+S.judges.map(j=>`<div class="chip"><span>${j.name}</span><button class="cx" data-rmj="${j.id}">×</button></div>`).join('')+'</div>'
    : '<p class="hint" style="margin-top:10px">No judges yet.</p>'}
  ${S.judges.length>0&&S.judges.length<3 ? '<p class="hint" style="margin-top:10px;color:#A32D2D">Add at least 3 judges to the pool.</p>' : ''}
</div></div>`;
}

function rMatches(){
  const can = S.teams.length>=2 && S.judges.length>=3;
  return `${S.creating ? rCreateForm() : `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
    <button class="btn-p" id="showCF"${can?'':' disabled'}>+ Create match</button>
    ${!can?'<span class="hint">Need ≥2 teams and ≥3 judges.</span>':''}
  </div>`}
${S.matches.length
  ? '<div style="display:flex;flex-direction:column;gap:7px">'+S.matches.map((m,i) => {
      const v1=m.done?t1Tot(m):null, v2=m.done?t2Tot(m):null;
      const w=m.done?(v1>v2?m.t1:v2>v1?m.t2:'Draw'):null;
      return `<div class="mc${m.done?' done':''}">
  <div class="mn">M${i+1}</div>
  <div class="m-rb">${RC[m.round].label}</div>
  <div class="mt"><div class="mtn">${m.t1}</div>${m.done?`<div class="mts" style="color:var(--am)">${v1}</div>`:''}</div>
  <div class="mvs">VS</div>
  <div class="mt" style="text-align:right"><div class="mtn">${m.t2}</div>${m.done?`<div class="mts" style="color:var(--bl)">${v2}</div>`:''}</div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-left:6px">
    ${w?`<div class="res">${w==='Draw'?'Draw':w+' wins'}</div>`:''}
    <button class="${m.done?'btn-ed':'btn-sc'}" data-sid="${m.id}">${m.done?'Edit':'Score ▶'}</button>
  </div>
</div>`;
    }).join('')+'</div>'
  : '<div class="empty">No matches yet. Create one above.</div>'}`;
}

function rCreateForm(){
  const cfg  = RC[S.nm.round];
  const jOk  = S.nm.jids.length===3;
  const maxJ = S.nm.jids.length>=3;
  const valid= S.nm.t1 && S.nm.t2 && S.nm.t1!==S.nm.t2 && jOk;
  const t1o  = '<option value="">Select team…</option>'+S.teams.map(t=>`<option value="${t}"${S.nm.t1===t?' selected':''}>${t}</option>`).join('');
  const t2o  = '<option value="">Select team…</option>'+S.teams.filter(t=>t!==S.nm.t1).map(t=>`<option value="${t}"${S.nm.t2===t?' selected':''}>${t}</option>`).join('');
  return `<div class="cf">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <span style="font-size:14px;font-weight:bold">New Match</span>
    <button class="btn-o" id="cancelCF">Cancel</button>
  </div>
  <div style="margin-bottom:.9rem">
    <div class="cf-lbl">Round</div>
    <div class="rbg">${Object.entries(RC).map(([id,c])=>`<button class="rb${S.nm.round===id?' on':''}" data-nr="${id}">${c.label}</button>`).join('')}</div>
    <div class="inf">
      <div><div class="sv">${cfg.drinks}</div><div class="sl">Drinks</div></div>
      <div><div class="sv">${cfg.time}</div><div class="sl">Time</div></div>
      <div><div class="sv">${cfg.maxJ}</div><div class="sl">Max judge pts</div></div>
    </div>
  </div>
  <div class="cf-row">
    <div><label class="cf-lbl">Team 1</label><select id="sel1">${t1o}</select></div>
    <div><label class="cf-lbl">Team 2</label><select id="sel2">${t2o}</select></div>
  </div>
  <div style="margin-bottom:.9rem">
    <div class="cf-lbl">Judges <span style="font-weight:bold;color:${jOk?'#0F6E56':'#CF8A10'}">(${S.nm.jids.length}/3 selected)</span></div>
    <div class="jpool">${S.judges.map(j => {
      const sel=S.nm.jids.includes(j.id), dim=maxJ&&!sel;
      return `<button class="jpill${sel?' on':''}${dim?' dim':''}" data-jp="${j.id}"><div class="jpick"></div>${j.name}</button>`;
    }).join('')}</div>
  </div>
  <button class="btn-p" id="doCF"${valid?'':' disabled'}>Create match</button>
</div>`;
}

function rHistory(){
  const done = S.matches.filter(m=>m.done);
  if(!done.length) return '<div class="empty">No completed matches yet.</div>';
  return '<div style="display:flex;flex-direction:column;gap:8px">'+done.map(m => {
    const v1=t1Tot(m), v2=t2Tot(m), w=v1>v2?1:v2>v1?2:0;
    return `<div class="hr-row">
  <div class="hr-rb">${RC[m.round].label}</div>
  <div class="hr-t${w===1?' w':''}">${m.t1}</div>
  <div class="hr-s" style="color:${w===1?'var(--am)':'var(--txt3)'}">${v1}</div>
  <div class="hvs">${w===0?'draw':'vs'}</div>
  <div class="hr-s" style="color:${w===2?'var(--bl)':'var(--txt3)'}">${v2}</div>
  <div class="hr-t${w===2?' w':''}" style="text-align:right">${m.t2}</div>
  ${(m.t1time||m.t2time)?`<div class="hr-time">⏱ <span style="color:var(--am)">${m.t1time||'—'}</span> / <span style="color:var(--bl)">${m.t2time||'—'}</span></div>`:''}
</div>`;
  }).join('')+'</div>';
}

function rLeaderboard(){
  const lb = calcLB();
  if(!lb.length) return '<div class="empty">Add teams in Setup.</div>';
  const noScores = !S.matches.filter(m=>m.done).length;
  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:.85rem">
  <span style="font-size:14px;font-weight:bold">Leaderboard</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <label style="font-size:12px;color:var(--txt3)">QF spots:</label>
    <input id="qfs" type="number" min="1" max="${lb.length}" value="${S.qfSlots}" style="width:56px;text-align:center;font-size:15px;font-weight:bold"/>
  </div>
</div>
${noScores?'<p class="hint" style="margin-bottom:10px">Finalise matches to see live scores.</p>':''}
<div style="display:flex;flex-direction:column;gap:7px">${lb.map((s,i) => {
  const isQF=(i+1)<=S.qfSlots, showCut=i===S.qfSlots-1&&S.qfSlots<lb.length;
  return `<div class="lb-row${isQF?' qf':''}">
  <div class="rnk ${i===0?'r1':i===1?'r2':i===2?'r3':'ro'}">${i+1}</div>
  <div class="lb-name">${s.t}</div>
  ${s.played>0
    ? `<div class="lb-rec">${s.wins}W / ${s.played-s.wins}L<span>${s.played} played</span></div>`
    : '<div class="lb-rec" style="color:var(--txt3)">—<span>no matches</span></div>'}
  <div class="lb-pts"><div class="lb-pn">${s.pts}</div><div class="lb-pl">pts</div></div>
  ${isQF?'<div class="qf-tag">QF ✓</div>':'<div style="width:48px"></div>'}
</div>${showCut?`<div class="cutline">QF cut — top ${S.qfSlots} advance</div>`:''}`;
}).join('')}</div>`;
}

function rScoring(){
  const m = S.matches.find(x=>x.id===S.sid);
  if(!m) return '';
  const cfg  = RC[m.round];
  const used = tokUsed(m), maxT=cfg.maxJ;
  const p1   = jPts1(m), p2=jPts2(m);
  const autoWin1 = p1>p2, autoWin2 = p2>p1;
  const t1n  = m.t1.length>18 ? m.t1.slice(0,16)+'…' : m.t1;
  const t2n  = m.t2.length>18 ? m.t2.slice(0,16)+'…' : m.t2;

  const grid = m.drinks.map((row,di) => {
    const [t1v,t2v] = row;
    const t1b = [0,1,2,3].map(v => `<button class="sb${t1v===v?' a-on':''}" data-di="${di}" data-tn="1" data-v="${v}"${v+t2v>3?' disabled':''}>${v}</button>`).join('');
    const t2b = [0,1,2,3].map(v => `<button class="sb${t2v===v?' b-on':''}" data-di="${di}" data-tn="2" data-v="${v}"${v+t1v>3?' disabled':''}>${v}</button>`).join('');
    return `<div class="scu-row"><div class="dl">D${di+1}</div><div><div class="btn-grp">${t1b}</div></div><div><div class="btn-grp">${t2b}</div></div></div>`;
  }).join('');

  // Manual bonuses only (fastest + sig bev for QF+)
  const manualBonuses = [
    {key:'fastest', label:'Fastest team', pts:2},
    ...(!isPre(m.round)?[{key:'sigBev', label:'Signature beverage', pts:2}]:[])
  ];

  const bonusPanel = (tn) => {
    const k  = tn===1?'s1':'s2';
    const nm = tn===1?m.t1:m.t2;
    const c  = tn===1?'t1':'t2';
    const aw = tn===1?autoWin1:autoWin2;
    return `<div class="sc-bp">
  <div class="sc-bp-h ${c}">${nm}</div>
  <div class="sc-bp-b">
    <div class="brow auto${aw?' on':''} ${c}" style="opacity:${aw?1:.38}">
      <div class="chk${aw?' on':''} ${c}"></div>
      <span class="bn">Round winner <span style="font-size:10px;color:var(--txt3)">(auto)</span></span>
      <span class="bpts-${c}">+5</span>
    </div>
    ${manualBonuses.map(b => `<div class="brow${m[k][b.key]?' on':''} ${c}" data-tn="${tn}" data-bn="${b.key}">
      <div class="chk${m[k][b.key]?' on':''} ${c}"></div>
      <span class="bn">${b.label}</span>
      <span class="bpts-${c}">+${b.pts}</span>
    </div>`).join('')}
  </div>
</div>`;
  };

  return `<div class="sc-hdr">
  <button class="btn-o" id="back">← Back</button>
  <div style="flex:1"><span style="font-size:14px;font-weight:bold">${m.t1} <span style="font-weight:normal;color:var(--txt3)">vs</span> ${m.t2}</span></div>
  <div class="badge">${cfg.label} · ${cfg.drinks} drinks</div>
</div>
<div class="sc-meta">
  <div class="sc-time-box"><div class="sc-time-lbl t1">${t1n} — Time</div><input id="t1time" type="text" value="${m.t1time}" placeholder="e.g. 8:42"/></div>
  <div class="sc-time-box"><div class="sc-time-lbl t2">${t2n} — Time</div><input id="t2time" type="text" value="${m.t2time}" placeholder="e.g. 9:10"/></div>
  <div class="sc-tok${used>maxT?' warn':''}">
    <div style="font-size:18px;font-weight:bold;line-height:1.1">${used}/${maxT}</div>
    <div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em">tokens</div>
  </div>
</div>
<div class="scu-wrap">
  <div class="scu">
    <div class="scu-hdr-row"><div class="dl"></div><div class="h1">${t1n}</div><div class="h2">${t2n}</div></div>
    <div class="scu-body" id="sg-scroll">${grid}</div>
    <div class="scu-tot-row"><div class="dl">Total</div><div class="t1v">${p1}</div><div class="t2v">${p2}</div></div>
  </div>
</div>
<div class="sc-bonuses">${bonusPanel(1)}${bonusPanel(2)}</div>
<div class="sc-tots">
  <div class="sc-tot"><div class="sc-tot-name">${m.t1}</div><div class="sc-tot-n t1">${t1Tot(m)}</div><div class="sc-tot-sub">pts</div></div>
  <div style="font-size:14px;color:var(--txt3)">vs</div>
  <div class="sc-tot"><div class="sc-tot-name">${m.t2}</div><div class="sc-tot-n t2">${t2Tot(m)}</div><div class="sc-tot-sub">pts</div></div>
</div>
<div style="display:flex;justify-content:center;padding:1.25rem 1.5rem 2rem">
  <button class="btn-p" id="fin" style="padding:10px 32px;font-size:14px">✓  Finalise match</button>
</div>`;
}

/* ── Event binding ── */
function bind(){
  const $ = id => document.getElementById(id);
  const on= (id,ev,fn) => { const el=$(id); if(el) el.addEventListener(ev,fn); };

  // Overlays
  on('pubview',   'click', () => showAudience());
  on('aud-close', 'click', () => document.getElementById('aud-overlay').classList.remove('show'));
  on('exportbtn', 'click', () => generatePDF());
  on('csvbtn',    'click', () => generateCSV());
  on('pdf-close', 'click', () => document.getElementById('pdf-overlay').classList.remove('show'));
  on('pdf-print', 'click', () => window.print());

  // Reset
  on('resetbtn','click',() => {
    if(confirm('Reset ALL competition data? This cannot be undone.')){
      localStorage.removeItem(STORE_KEY);
      mid=0; jid=0;
      S={judges:[],teams:[],matches:[],tab:'setup',sid:null,creating:false,
         nm:{t1:'',t2:'',round:'preliminary',jids:[]},qfSlots:4,eventDate:'',eventVenue:''};
      render();
    }
  });

  // Tabs
  document.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click',()=>{S.tab=b.dataset.tab;render();}));

  // Event info (save without re-render to keep focus)
  const evdate=$('evdate'), evvenue=$('evvenue');
  if(evdate)  evdate.addEventListener('input', () => { S.eventDate  = evdate.value;  saveState(); });
  if(evvenue) evvenue.addEventListener('input',() => { S.eventVenue = evvenue.value; saveState(); });

  // Teams
  const addTeam = () => {
    const inp=$('tinp'); if(!inp) return;
    const t=inp.value.trim();
    if(t && !S.teams.some(x=>x.toLowerCase()===t.toLowerCase())){ S.teams.push(t); inp.value=''; render(); }
    else inp.value='';
  };
  on('addt','click',addTeam);
  on('tinp','keydown', e => e.key==='Enter' && addTeam());
  document.querySelectorAll('[data-rmt]').forEach(b => b.addEventListener('click',()=>{S.teams=S.teams.filter(t=>t!==b.dataset.rmt);render();}));

  // Judges
  const addJudge = () => {
    const inp=$('jinp'); if(!inp) return;
    const n=inp.value.trim();
    if(n && !S.judges.some(j=>j.name.toLowerCase()===n.toLowerCase())){ S.judges.push({id:String(jid++),name:n}); inp.value=''; render(); }
    else inp.value='';
  };
  on('addj','click',addJudge);
  on('jinp','keydown', e => e.key==='Enter' && addJudge());
  document.querySelectorAll('[data-rmj]').forEach(b => b.addEventListener('click',()=>{S.judges=S.judges.filter(j=>j.id!==b.dataset.rmj);render();}));

  // Create match form
  on('showCF',  'click', () => { S.creating=true; S.nm={t1:'',t2:'',round:'preliminary',jids:[]}; render(); });
  on('cancelCF','click', () => { S.creating=false; render(); });
  document.querySelectorAll('[data-nr]').forEach(b => b.addEventListener('click',()=>{ S.nm.round=b.dataset.nr; render(); }));
  const s1=$('sel1'), s2=$('sel2');
  if(s1) s1.addEventListener('change',()=>{ S.nm.t1=s1.value; if(S.nm.t2===S.nm.t1) S.nm.t2=''; render(); });
  if(s2) s2.addEventListener('change',()=>{ S.nm.t2=s2.value; render(); });
  document.querySelectorAll('[data-jp]').forEach(b => b.addEventListener('click',()=>{
    const id=b.dataset.jp, sel=S.nm.jids.includes(id);
    S.nm.jids = sel ? S.nm.jids.filter(x=>x!==id) : S.nm.jids.length<3 ? [...S.nm.jids,id] : S.nm.jids;
    render();
  }));
  on('doCF','click',() => {
    const cfg=RC[S.nm.round];
    S.matches.push({
      id:String(mid++), round:S.nm.round, t1:S.nm.t1, t2:S.nm.t2,
      jids:[...S.nm.jids], ...mkMatch(cfg.drinks), done:false
    });
    S.creating=false; S.nm={t1:'',t2:'',round:'preliminary',jids:[]}; render();
  });

  // QF slots
  const qfs=$('qfs');
  if(qfs) qfs.addEventListener('change',()=>{ S.qfSlots=Math.max(1,+qfs.value||1); render(); });

  // Match open / back / finalise
  document.querySelectorAll('[data-sid]').forEach(b => b.addEventListener('click',()=>{ S.sid=b.dataset.sid; render(); }));
  on('back','click',()=>{ S.sid=null; render(); });
  on('fin', 'click',()=>{ const m=S.matches.find(x=>x.id===S.sid); if(m) m.done=true; S.sid=null; S.tab='matches'; render(); });

  // Time inputs
  const t1t=$('t1time'), t2t=$('t2time');
  if(t1t) t1t.addEventListener('input',()=>{ const m=S.matches.find(x=>x.id===S.sid); if(m){m.t1time=t1t.value;saveState();} });
  if(t2t) t2t.addEventListener('input',()=>{ const m=S.matches.find(x=>x.id===S.sid); if(m){m.t2time=t2t.value;saveState();} });

  // Score buttons
  document.querySelectorAll('[data-v][data-tn][data-di]').forEach(btn => btn.addEventListener('click',()=>{
    const di=+btn.dataset.di, tn=+btn.dataset.tn, v=+btn.dataset.v;
    const sc = document.getElementById('sg-scroll')?.scrollTop || 0;
    const m  = S.matches.find(x=>x.id===S.sid); if(!m) return;
    m.drinks[di][tn===1?0:1] = v;
    render();
    const sg=document.getElementById('sg-scroll'); if(sg) sg.scrollTop=sc;
  }));

  // Manual bonus toggles (fastest + sigBev only)
  document.querySelectorAll('[data-bn]').forEach(el => el.addEventListener('click',()=>{
    const tn=+el.dataset.tn, bn=el.dataset.bn;
    const m=S.matches.find(x=>x.id===S.sid); if(!m) return;
    const k=tn===1?'s1':'s2', ok=tn===1?'s2':'s1';
    const nv=!m[k][bn];
    if(bn==='fastest' && nv) m[ok][bn]=false; // mutually exclusive
    m[k][bn]=nv;
    render();
  }));
}

render();
</script>
</body>
</html>
