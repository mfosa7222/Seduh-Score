<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BBTC Organizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --am:#B45309;--am-h:#92400E;--am-bg:#FFFBEB;--am-bd:#F59E0B;
  --bl:#1D4ED8;--bl-bg:#EFF6FF;--bl-bd:#93C5FD;
  --gn:#065F46;--gn-bg:#ECFDF5;--gn-bd:#6EE7B7;
  --rd:#991B1B;--rd-bg:#FEF2F2;--rd-bd:#FCA5A5;
  --bg:#F3F4F6;--surface:#FFFFFF;--border:#D1D5DB;--border2:#E5E7EB;
  --txt:#111827;--txt2:#374151;--txt3:#6B7280;
  --rad:8px;--rad-s:5px;
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
body{background:var(--bg);color:var(--txt);min-height:100vh}
input,select,button{font-family:inherit}
.app{max-width:900px;margin:0 auto;padding:0 0 60px}
/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:.85rem 1.5rem;background:var(--surface);border-bottom:2px solid var(--am-bd);position:sticky;top:0;z-index:100;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.hdr-ac{width:4px;height:38px;background:var(--am);border-radius:2px;flex-shrink:0}
.hdr-s{font-size:10px;color:var(--am);letter-spacing:.18em;text-transform:uppercase;margin-bottom:2px;font-weight:600}
.hdr-t{font-size:17px;font-weight:700;color:var(--txt);letter-spacing:-.01em}
.badge{background:var(--am-bg);border:1.5px solid var(--am-bd);border-radius:var(--rad-s);padding:3px 10px;font-size:11px;color:var(--am);white-space:nowrap;font-weight:600}
.hdr-btns{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn-hdr{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--rad-s);font-size:12px;cursor:pointer;font-weight:600;border:1.5px solid}
.btn-am{border-color:var(--am-bd);background:var(--am-bg);color:var(--am)}.btn-am:hover{background:var(--am);color:#fff;border-color:var(--am)}
.btn-bl{border-color:var(--bl-bd);background:var(--bl-bg);color:var(--bl)}.btn-bl:hover{background:var(--bl);color:#fff;border-color:var(--bl)}
.btn-gn{border-color:var(--gn-bd);background:var(--gn-bg);color:var(--gn)}.btn-gn:hover{background:var(--gn);color:#fff;border-color:var(--gn)}
.btn-rd{border-color:var(--rd-bd);background:var(--rd-bg);color:var(--rd);font-size:11px;padding:5px 10px}.btn-rd:hover{background:var(--rd);color:#fff}
/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border);padding:0 1.5rem;overflow-x:auto}
.tbtn{padding:.6rem .95rem;border:none;background:transparent;font-size:12px;cursor:pointer;color:var(--txt3);border-bottom:2px solid transparent;margin-bottom:-2px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;font-weight:600}
.tbtn.on{color:var(--am);border-bottom-color:var(--am)}
/* Body */
.body{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem}
/* Cards */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ch{padding:.5rem 1rem;border-bottom:1.5px solid var(--border2);font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;background:var(--bg);font-weight:700}
.cb{padding:1rem}
/* Round buttons */
.rbg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.rb{padding:6px 14px;border:1.5px solid var(--border);border-radius:var(--rad-s);background:transparent;font-size:12px;cursor:pointer;color:var(--txt2);font-weight:600}
.rb.on{border-color:var(--am);background:var(--am-bg);color:var(--am)}
/* Info strip */
.inf{display:flex;gap:1.5rem;padding:.6rem 1rem;background:var(--bg);border-radius:var(--rad-s);margin-top:8px;border:1.5px solid var(--border)}
.sv{font-size:15px;font-weight:700;color:var(--am)}.sl{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
/* Inputs */
.ir{display:flex;gap:8px}.ir input{flex:1}
input[type=text],input[type=number],select{border:1.5px solid var(--border);border-radius:var(--rad-s);padding:8px 11px;font-size:13px;background:var(--surface);color:var(--txt);outline:none;width:100%}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--am);box-shadow:0 0 0 3px rgba(180,83,9,.1)}
/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{display:flex;align-items:center;gap:5px;padding:4px 9px 4px 11px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rad-s);font-size:13px;font-weight:500}
.cn{font-size:10px;color:var(--txt3);margin-right:1px}
.cx{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;line-height:1;padding:0}
/* Buttons */
.btn-p{background:var(--am);color:#fff;border:none;padding:9px 20px;border-radius:var(--rad-s);font-size:13px;font-weight:700;cursor:pointer}
.btn-p:hover{background:var(--am-h)}
.btn-p:disabled{background:var(--border);color:var(--txt3);cursor:default}
.btn-o{background:transparent;border:1.5px solid var(--border);padding:7px 14px;border-radius:var(--rad-s);font-size:12px;cursor:pointer;color:var(--txt2);font-weight:600}
.btn-o:hover{border-color:var(--txt3)}
.btn-sc{background:var(--am-bg);border:1.5px solid var(--am-bd);padding:5px 12px;border-radius:var(--rad-s);font-size:11px;cursor:pointer;color:var(--am);font-weight:700}
.btn-ed{background:transparent;border:1.5px solid var(--border);padding:5px 12px;border-radius:var(--rad-s);font-size:11px;cursor:pointer;color:var(--txt2)}
.hint{font-size:12px;color:var(--txt3)}
/* Create match form */
.cf{background:var(--am-bg);border:1.5px solid var(--am-bd);border-radius:var(--rad);padding:1.1rem;margin-bottom:.75rem}
.cf-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.cf-lbl{font-size:11px;color:var(--txt3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em;display:block;font-weight:700}
/* Judge pills */
.jpool{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.jpill{display:flex;align-items:center;gap:5px;padding:6px 11px;border:1.5px solid var(--border);border-radius:var(--rad-s);font-size:12px;cursor:pointer;background:var(--surface);color:var(--txt2);font-weight:600}
.jpill.on{border-color:var(--am);background:var(--am-bg);color:var(--am)}
.jpill.dim{opacity:.3;cursor:default;pointer-events:none}
.jpick{width:13px;height:13px;border-radius:2px;border:2px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.jpill.on .jpick::after{content:'✓';font-size:9px;line-height:1;font-weight:900}
/* Match cards */
.mc{background:var(--surface);border:1.5px solid var(--border);border-left:4px solid var(--am);border-radius:0 var(--rad) var(--rad) 0;padding:.85rem 1rem;display:flex;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.mc.done{border-left-color:var(--gn)}
.mn{font-size:10px;color:var(--txt3);width:22px;flex-shrink:0;font-weight:700}
.mt{flex:1;min-width:0;overflow:hidden}
.mtn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.mts{font-size:20px;line-height:1.1;font-weight:700}
.mvs{font-size:10px;color:var(--txt3);letter-spacing:.12em;padding:0 5px;flex-shrink:0;font-weight:700}
.m-rb{font-size:9px;padding:2px 7px;border-radius:var(--rad-s);border:1.5px solid var(--border);color:var(--txt3);background:var(--bg);white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.res{font-size:10px;color:var(--gn);background:var(--gn-bg);border:1.5px solid var(--gn-bd);border-radius:var(--rad-s);padding:2px 8px;white-space:nowrap;font-weight:700}
/* History */
.hr-row{display:flex;align-items:center;gap:8px;padding:.75rem 1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad);flex-wrap:wrap;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.hr-rb{font-size:10px;color:var(--txt3);background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rad-s);padding:2px 7px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.hr-t{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;font-weight:500}
.hr-t.w{font-weight:700;color:var(--am)}
.hr-s{font-size:19px;flex-shrink:0;font-weight:700}
.hvs{font-size:10px;color:var(--txt3);padding:0 3px;flex-shrink:0;font-weight:700}
.hr-time{font-size:10px;color:var(--txt3);background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rad-s);padding:2px 8px;white-space:nowrap;flex-shrink:0;font-weight:600}
/* Standings / Leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.lb-row.qf{background:var(--gn-bg);border-color:var(--gn-bd);border-left:4px solid var(--gn)}
.lb-row.qf .lb-name{color:var(--gn);font-weight:700}
.lb-row.qf .lb-rec{color:#065F46}
.rnk{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.r1{background:#D97706;color:#fff}.r2{background:#9CA3AF;color:#fff}.r3{background:#92400E;color:#fff}.ro{background:var(--bg);color:var(--txt3);border:1.5px solid var(--border)}
.lb-name{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
.lb-rec{text-align:center;font-size:12px;flex-shrink:0;color:var(--txt2);font-weight:600}
.lb-rec span{display:block;font-size:10px;color:var(--txt3);font-weight:500}
.lb-pts{text-align:right;flex-shrink:0}
.lb-pn{font-size:24px;color:var(--am);line-height:1;font-weight:700}
.lb-pl{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.qf-tag{font-size:10px;color:var(--gn);background:var(--gn-bg);border:1.5px solid var(--gn-bd);border-radius:var(--rad-s);padding:2px 8px;white-space:nowrap;flex-shrink:0;font-weight:700}
.cutline{display:flex;align-items:center;gap:8px;padding:.3rem .5rem;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.cutline::before,.cutline::after{content:'';flex:1;height:2px;background:var(--gn-bd)}
/* Bracket */
.bracket-section{margin-bottom:1.5rem}
.bracket-section-title{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:.6rem;padding:.4rem .85rem;background:var(--bg);border-radius:var(--rad-s);border:1.5px solid var(--border);display:flex;align-items:center;gap:8px}
.bracket-grid{display:flex;flex-direction:column;gap:8px}
.bslot{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.bslot.done{border-color:var(--gn-bd)}
.bslot.active{border-color:var(--am-bd);border-left:4px solid var(--am)}
.bslot-hdr{display:flex;align-items:center;justify-content:space-between;padding:.4rem .85rem;background:var(--bg);border-bottom:1.5px solid var(--border2);font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em}
.bslot-teams{padding:.6rem .85rem;display:flex;flex-direction:column;gap:5px}
.bslot-team{display:flex;align-items:center;gap:8px}
.bslot-seed{font-size:10px;color:var(--txt3);width:20px;text-align:center;font-weight:700;background:var(--bg);border-radius:3px;padding:1px 3px;border:1px solid var(--border)}
.bslot-name{flex:1;font-size:13px;font-weight:600;color:var(--txt)}
.bslot-score{font-size:20px;font-weight:700;color:var(--am)}
.bslot-name.winner{color:var(--gn);font-weight:700}
.bslot-name.loser{color:var(--txt3)}
.bslot-name.tbd{color:var(--txt3);font-style:italic;font-weight:400}
.bslot-divider{height:1px;background:var(--border2);margin:0}
.bslot-footer{padding:.5rem .85rem;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-top:1.5px solid var(--border2)}
.bslot-status{font-size:11px;color:var(--txt3);font-weight:600}
.bslot-status.awaiting{color:var(--txt3)}
.bslot-status.winner-label{color:var(--gn);font-weight:700}
/* Bracket judge pick inline */
.bjpick{padding:.75rem .85rem;background:var(--am-bg);border-top:1.5px solid var(--am-bd)}
.bjpick-lbl{font-size:11px;color:var(--am);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em}
/* Scoring */
.sc-hdr{display:flex;align-items:center;gap:10px;padding:.85rem 1.5rem;border-bottom:2px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sc-meta{display:flex;align-items:stretch;gap:10px;padding:.85rem 1.5rem;border-bottom:2px solid var(--border);background:var(--bg)}
.sc-time-box{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad-s);padding:.6rem .85rem}
.sc-time-lbl{font-size:10px;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.sc-time-lbl.t1{color:var(--am)}.sc-time-lbl.t2{color:var(--bl)}
.sc-time-box input{width:100%;background:transparent;border:none;outline:none;font-size:15px;font-weight:700;color:var(--txt)}
.sc-tok{align-self:center;padding:.5rem 1rem;border-radius:var(--rad-s);border:1.5px solid var(--border);font-size:11px;text-align:center;background:var(--surface);white-space:nowrap;font-weight:700}
.sc-tok.warn{color:var(--rd);border-color:var(--rd-bd);background:var(--rd-bg)}
.scu-wrap{padding:.85rem 1.5rem 0}
.scu{border:1.5px solid var(--border);border-radius:var(--rad);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.scu-hdr-row,.scu-row,.scu-tot-row{display:grid;grid-template-columns:36px 1fr 1fr}
.scu-hdr-row>div{padding:.45rem .6rem;background:var(--bg);font-size:13px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt2)}
.scu-hdr-row>.dl{text-align:left;font-size:11px;color:var(--txt3);font-weight:600}
.scu-hdr-row>.h1{color:var(--am);border-bottom:3px solid var(--am)}
.scu-hdr-row>.h2{color:var(--bl);border-bottom:3px solid var(--bl)}
.scu-body{overflow-y:auto;max-height:360px}
.scu-body::-webkit-scrollbar{width:3px}
.scu-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.scu-row>div{padding:.25rem .4rem;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:center}
.scu-row:nth-child(odd)>div{background:var(--bg)}
.scu-row:last-child>div{border-bottom:none}
.scu-row .dl{font-size:11px;color:var(--txt3);justify-content:flex-start;padding-left:.6rem;font-weight:600}
.btn-grp{display:flex;gap:3px}
.sb{width:38px;height:34px;border-radius:var(--rad-s);border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(--txt2)}
.sb:hover:not(:disabled){border-color:var(--txt3);background:var(--bg)}
.sb:disabled{opacity:.18;cursor:default}
.sb.a-on{background:var(--am);border-color:var(--am);color:#fff}
.sb.b-on{background:var(--bl);border-color:var(--bl);color:#fff}
.scu-tot-row>div{padding:.45rem .6rem;background:var(--bg);border-top:2px solid var(--border);text-align:center;font-size:17px;font-weight:700}
.scu-tot-row .dl{font-size:11px;color:var(--txt3);font-weight:600;text-align:left;padding-left:.6rem;display:flex;align-items:center}
.scu-tot-row .t1v{color:var(--am)}.scu-tot-row .t2v{color:var(--bl)}
.sc-bonuses{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:1rem 1.5rem 0}
.sc-bp{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad);overflow:hidden}
.sc-bp-h{padding:.45rem .9rem;font-size:11px;font-weight:700;border-bottom:1.5px solid var(--border2);background:var(--bg);text-transform:uppercase;letter-spacing:.06em}
.sc-bp-h.t1{color:var(--am)}.sc-bp-h.t2{color:var(--bl)}
.sc-bp-b{padding:.65rem .9rem;display:flex;flex-direction:column;gap:6px}
.brow{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--rad-s);cursor:pointer}
.brow:hover:not(.auto){background:var(--bg)}
.brow.on.t1{background:var(--am-bg)}.brow.on.t2{background:var(--bl-bg)}
.chk{width:16px;height:16px;border-radius:3px;border:2px solid var(--border);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.on.t1{background:var(--am);border-color:var(--am)}.chk.on.t2{background:var(--bl);border-color:var(--bl)}
.chk.on::after{content:'✓';color:#fff;font-size:10px;line-height:1;font-weight:900}
.bn{flex:1;font-size:12px;color:var(--txt2);font-weight:500}.brow.on .bn{color:var(--txt);font-weight:600}
.bpts-t1{font-size:12px;font-weight:700;color:var(--am)}.bpts-t2{font-size:12px;font-weight:700;color:var(--bl)}
.sc-tots{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;padding:1rem 1.5rem 0}
.sc-tot{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rad);padding:.75rem 1rem;text-align:center}
.sc-tot-name{font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.sc-tot-n{font-size:34px;line-height:1.1;font-weight:700}
.sc-tot-n.t1{color:var(--am)}.sc-tot-n.t2{color:var(--bl)}
.sc-tot-sub{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
/* Audience overlay */
#aud-overlay{display:none;position:fixed;inset:0;z-index:998;background:#F9FAFB;overflow:hidden;flex-direction:column}
#aud-overlay.show{display:flex}
.aud-banner{display:flex;align-items:center;gap:14px;padding:.9rem 2rem;background:#fff;border-bottom:3px solid #D97706;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.aud-ac{width:4px;height:42px;background:#D97706;border-radius:2px;flex-shrink:0}
.aud-sub{font-size:10px;color:#D97706;letter-spacing:.25em;text-transform:uppercase;margin-bottom:3px;font-weight:700}
.aud-title{font-size:20px;color:#111827;font-weight:700;letter-spacing:-.01em}
.aud-ts{margin-left:auto;text-align:right;font-size:11px;color:#9CA3AF;line-height:1.7;font-weight:600}
.aud-close{background:#F3F4F6;border:1.5px solid #D1D5DB;color:#374151;font-size:12px;font-weight:700;padding:7px 16px;border-radius:6px;cursor:pointer;flex-shrink:0;text-transform:uppercase;letter-spacing:.08em}
.aud-close:hover{background:#B45309;color:#fff;border-color:#B45309}
.aud-body{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}
.aud-panel{overflow-y:auto;padding:1.5rem 1.75rem;background:#F9FAFB}
.aud-panel:first-child{border-right:2px solid #E5E7EB}
.aud-panel::-webkit-scrollbar{width:3px}
.aud-panel::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:2px}
.aud-sec-title{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:#B45309;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:2px solid #B45309;font-weight:700}
.aud-lb-row{display:flex;align-items:center;gap:12px;padding:.9rem 1.1rem;border-radius:8px;margin-bottom:8px;border:1.5px solid #E5E7EB;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.aud-lb-row.qf{background:#ECFDF5;border-color:#6EE7B7;border-left:4px solid #065F46}
.aud-rnk{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.aud-name{flex:1;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#111827;font-weight:700}
.aud-lb-row.qf .aud-name{color:#065F46}
.aud-rec{text-align:center;font-size:12px;color:#6B7280;flex-shrink:0;line-height:1.5;font-weight:600}

<script>
const RC={
  preliminary:   {label:'Preliminary',   drinks:15,time:'10 min',maxJ:45},
  quarterfinals: {label:'Quarter Finals',drinks:20,time:'15 min',maxJ:60},
  semifinals:    {label:'Semi Finals',   drinks:20,time:'15 min',maxJ:60},
  finals:        {label:'Finals',        drinks:20,time:'15 min',maxJ:60}
};
const isPre=r=>r==='preliminary';
const mkMatch=n=>({drinks:Array.from({length:n},()=>[0,0]),s1:{fastest:false,sigBev:false},s2:{fastest:false,sigBev:false},t1time:'',t2time:''});
const jPts1=m=>m.drinks.reduce((a,r)=>a+r[0],0);
const jPts2=m=>m.drinks.reduce((a,r)=>a+r[1],0);
const tokUsed=m=>m.drinks.reduce((a,r)=>a+r[0]+r[1],0);
const t1Tot=m=>{const p1=jPts1(m),p2=jPts2(m);return p1+(m.s1.fastest?2:0)+(p1>p2?5:0)+(!isPre(m.round)&&m.s1.sigBev?2:0);};
const t2Tot=m=>{const p1=jPts1(m),p2=jPts2(m);return p2+(m.s2.fastest?2:0)+(p2>p1?5:0)+(!isPre(m.round)&&m.s2.sigBev?2:0);};

const STORE_KEY='bbtc_v3';
let mid=0,jid=0;
let S={
  judges:[],teams:[],matches:[],bracket:null,
  tab:'setup',sid:null,creating:false,bracketPicking:null,bracketJids:[],
  nm:{t1:'',t2:'',round:'preliminary',jids:[]},
  qfSlots:8,eventDate:'',eventVenue:''
};

// Timer state (not persisted)
let TMR={ms:600000,running:false,iv:null,preset:600};

function fmtTime(ms){
  const tot=Math.max(0,Math.ceil(ms/1000));
  const m=Math.floor(tot/60),s=tot%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function saveState(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify({
    judges:S.judges,teams:S.teams,matches:S.matches,bracket:S.bracket,
    qfSlots:S.qfSlots,mid,jid,eventDate:S.eventDate,eventVenue:S.eventVenue
  }));}catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw)return;
    const d=JSON.parse(raw);
    S.judges=d.judges||[];S.teams=d.teams||[];S.matches=d.matches||[];
    S.bracket=d.bracket||null;S.qfSlots=d.qfSlots||8;
    S.eventDate=d.eventDate||'';S.eventVenue=d.eventVenue||'';
    mid=d.mid||0;jid=d.jid||0;
  }catch(e){}
}
loadState();

/* ── Demo data ── */
function demoMatch(id,round,t1,t2,jp1,jp2,fast1,fast2,t1t,t2t,sig1,sig2){
  const n=round==='preliminary'?15:20;
  const d=Array.from({length:n},()=>[0,0]);
  let r1=jp1,r2=jp2;
  for(let i=0;i<n;i++){
    const left=n-i;
    const g1=Math.min(3,Math.max(0,Math.round(r1/left)));
    const g2=Math.min(3-g1,Math.max(0,Math.round(r2/left)));
    d[i]=[g1,g2];r1-=g1;r2-=g2;
  }
  for(let i=0;i<n&&(r1>0||r2>0);i++){
    if(r1>0&&d[i][0]+d[i][1]<3){const a=Math.min(r1,3-d[i][0]-d[i][1]);d[i][0]+=a;r1-=a;}
    if(r2>0&&d[i][0]+d[i][1]<3){const a=Math.min(r2,3-d[i][0]-d[i][1]);d[i][1]+=a;r2-=a;}
  }
  return{id:String(id),round,t1,t2,jids:['0','1','2'],drinks:d,
    s1:{fastest:fast1,sigBev:sig1||false},s2:{fastest:fast2,sigBev:sig2||false},
    t1time:t1t,t2time:t2t,done:true,bracketSlot:null};
}

function buildBBTCDemo(){
  const teams=['Kopi Warisan','Bandar Blend','Seria Brew Co.','Gadong Roasters','Kiulap Collective','Rimba Republic','Temu Kopi','Sungai Kafe'];
  const judges=[{id:'0',name:'Ahmad Zaki'},{id:'1',name:'Siti Hajar'},{id:'2',name:'Marcus Lim'}];
  // 12 prelim matches — standings: 1.KW(92,3W) 2.BB(92,2W) 3.SC(91,3W) 4.GR(75,2W) 5.KC(53,1W) 6.TK(47,0W) 7.RR(41,0W) 8.SK(38,1W)
  const matches=[
    demoMatch(0,'preliminary','Kopi Warisan','Temu Kopi',28,12,false,false,'8:14','9:42'),
    demoMatch(1,'preliminary','Gadong Roasters','Sungai Kafe',25,14,true,false,'7:55','9:18'),
    demoMatch(2,'preliminary','Seria Brew Co.','Kiulap Collective',26,15,false,true,'8:44','8:01'),
    demoMatch(3,'preliminary','Bandar Blend','Rimba Republic',24,16,false,false,'9:02','9:33'),
    demoMatch(4,'preliminary','Kopi Warisan','Kiulap Collective',27,13,true,false,'7:48','9:11'),
    demoMatch(5,'preliminary','Gadong Roasters','Bandar Blend',23,18,false,false,'8:30','8:22'),
    demoMatch(6,'preliminary','Seria Brew Co.','Rimba Republic',29,10,true,false,'7:38','9:55'),
    demoMatch(7,'preliminary','Bandar Blend','Temu Kopi',22,17,false,false,'8:58','9:27'),
    demoMatch(8,'preliminary','Kopi Warisan','Gadong Roasters',22,17,false,true,'8:05','7:59'),
    demoMatch(9,'preliminary','Seria Brew Co.','Bandar Blend',21,18,false,true,'8:17','8:10'),
    demoMatch(10,'preliminary','Kiulap Collective','Rimba Republic',20,15,false,false,'9:14','9:38'),
    demoMatch(11,'preliminary','Temu Kopi','Sungai Kafe',18,19,false,false,'9:20','9:05'),
    // QF matches — QF1 and QF2 done, QF3 and QF4 pending
    demoMatch(12,'quarterfinals','Kopi Warisan','Sungai Kafe',28,11,true,false,'7:42','9:58'),
    demoMatch(13,'quarterfinals','Seria Brew Co.','Temu Kopi',25,14,false,false,'8:11','9:30',true,false),
  ];
  const bracket={
    qf:[
      {id:'qf1',label:'QF 1',seeds:[1,8],t1:'Kopi Warisan',t2:'Sungai Kafe',matchId:'12',winner:'Kopi Warisan',loser:'Sungai Kafe',from:[]},
      {id:'qf2',label:'QF 2',seeds:[3,6],t1:'Seria Brew Co.',t2:'Temu Kopi',matchId:'13',winner:'Seria Brew Co.',loser:'Temu Kopi',from:[]},
      {id:'qf3',label:'QF 3',seeds:[4,5],t1:'Gadong Roasters',t2:'Kiulap Collective',matchId:null,winner:null,loser:null,from:[]},
      {id:'qf4',label:'QF 4',seeds:[2,7],t1:'Bandar Blend',t2:'Rimba Republic',matchId:null,winner:null,loser:null,from:[]},
    ],
    sf:[
      {id:'sf1',label:'SF 1',seeds:[],t1:'Kopi Warisan',t2:'Seria Brew Co.',matchId:null,winner:null,loser:null,from:['qf1','qf2']},
      {id:'sf2',label:'SF 2',seeds:[],t1:null,t2:null,matchId:null,winner:null,loser:null,from:['qf3','qf4']},
    ],
    final:{id:'final',label:'Final',seeds:[],t1:null,t2:null,matchId:null,winner:null,loser:null,from:['sf1','sf2']},
    third:{id:'third',label:'3rd Place',seeds:[],t1:null,t2:null,matchId:null,winner:null,loser:null,from:['sf1','sf2']},
  };
  return{teams,judges,matches,bracket,qfSlots:8,eventDate:'16 June 2025',eventVenue:'Grey Matter Coffee Werks'};
}

function loadBBTCDemo(){
  const d=buildBBTCDemo();
  S.teams=d.teams;S.judges=d.judges;S.matches=d.matches;S.bracket=d.bracket;
  S.qfSlots=d.qfSlots;S.eventDate=d.eventDate;S.eventVenue=d.eventVenue;
  S.tab='prelims';S.sid=null;S.creating=false;S.bracketPicking=null;S.bracketJids=[];
  S.nm={t1:'',t2:'',round:'preliminary',jids:[]};
  mid=14;jid=3;
  saveState();
}

/* ── Leaderboard — PRELIMINARY ONLY ── */
function calcPrelimLB(){
  return S.teams.map(t=>{
    let pts=0,played=0,wins=0;
    S.matches.filter(m=>m.done&&m.round==='preliminary').forEach(m=>{
      if(m.t1===t){const p=t1Tot(m),q=t2Tot(m);pts+=p;played++;if(p>q)wins++;}
      if(m.t2===t){const p=t2Tot(m),q=t1Tot(m);pts+=p;played++;if(p>q)wins++;}
    });
    return{t,pts,played,wins};
  }).sort((a,b)=>b.pts-a.pts||b.wins-a.wins);
}

/* ── Bracket engine ── */
function makeBracketSlot(id,label,seeds,t1,t2,from){
  return{id,label,seeds:seeds||[],t1:t1||null,t2:t2||null,matchId:null,winner:null,loser:null,from:from||[]};
}

function generateBracket(){
  const lb=calcPrelimLB();
  const adv=lb.slice(0,S.qfSlots).map(x=>x.t);
  const n=adv.length;
  const b={qf:[],sf:[],final:null,third:null};

  if(n>=8){
    // QF: 1v8, 3v6, 4v5, 2v7
    b.qf=[
      makeBracketSlot('qf1','QF 1',[1,8],adv[0],adv[7],[]),
      makeBracketSlot('qf2','QF 2',[3,6],adv[2],adv[5],[]),
      makeBracketSlot('qf3','QF 3',[4,5],adv[3],adv[4],[]),
      makeBracketSlot('qf4','QF 4',[2,7],adv[1],adv[6],[]),
    ];
    b.sf=[
      makeBracketSlot('sf1','SF 1',[],null,null,['qf1','qf2']),
      makeBracketSlot('sf2','SF 2',[],null,null,['qf3','qf4']),
    ];
  } else if(n>=4){
    // Skip QF, go to SF: 1v4, 2v3
    b.sf=[
      makeBracketSlot('sf1','SF 1',[1,4],adv[0],adv[3]||null,[]),
      makeBracketSlot('sf2','SF 2',[2,3],adv[1],adv[2]||null,[]),
    ];
  }

  if(n>=4){
    b.final=makeBracketSlot('final','Final',[],null,null,['sf1','sf2']);
    b.third=makeBracketSlot('third','3rd Place',[],null,null,['sf1','sf2']);
  } else {
    // Direct final
    b.final=makeBracketSlot('final','Final',[1,2],adv[0]||null,adv[1]||null,[]);
    b.third=null;
  }
  S.bracket=b;
  saveState();
}

function allBracketSlots(){
  if(!S.bracket)return[];
  const b=S.bracket;
  return [...(b.qf||[]),...(b.sf||[]),b.final,b.third].filter(Boolean);
}

function updateBracketAfterMatch(matchId){
  if(!S.bracket)return;
  const slots=allBracketSlots();
  const slot=slots.find(s=>s.matchId===matchId);
  if(!slot)return;
  const m=S.matches.find(x=>x.id===matchId);
  if(!m)return;
  const v1=t1Tot(m),v2=t2Tot(m);
  slot.winner=v1>v2?m.t1:m.t2;
  slot.loser =v1>v2?m.t2:m.t1;
  // Advance into downstream slots
  slots.filter(s=>s.from&&s.from.includes(slot.id)).forEach(ds=>{
    const feeders=ds.from.map(fid=>slots.find(s=>s.id===fid)).filter(Boolean);
    if(!feeders.every(f=>f.winner))return;
    if(ds.id==='third'){ds.t1=feeders[0].loser;ds.t2=feeders[1].loser;}
    else{ds.t1=feeders[0].winner;ds.t2=feeders[1].winner;}
  });
  saveState();
}

function createBracketMatch(slotId,jids){
  const slots=allBracketSlots();
  const slot=slots.find(s=>s.id===slotId);
  if(!slot||!slot.t1||!slot.t2)return;
  const round=slotId.startsWith('qf')?'quarterfinals':slotId.startsWith('sf')?'semifinals':'finals';
  const cfg=RC[round];
  const m={id:String(mid++),round,t1:slot.t1,t2:slot.t2,jids:[...jids],...mkMatch(cfg.drinks),done:false,bracketSlot:slotId};
  S.matches.push(m);
  slot.matchId=m.id;
  S.sid=m.id;
  S.bracketPicking=null;
  S.bracketJids=[];
  saveState();
  render();
}

/* ── CSV ── */
function generateCSV(){
  const esc=v=>{const s=String(v==null?'':v);return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;};
  const row=cols=>cols.map(esc).join(',');
  const lines=[];
  const eventMeta=[S.eventDate,S.eventVenue].filter(Boolean).join(' | ');
  lines.push(row(['Brunei Barista Team Championship',eventMeta]));lines.push('');
  lines.push(row(['PRELIMINARY STANDINGS']));
  lines.push(row(['Rank','Team','Wins','Losses','Played','Points','QF Qualified']));
  calcPrelimLB().forEach((s,i)=>lines.push(row([i+1,s.t,s.wins,s.played-s.wins,s.played,s.pts,(i+1)<=S.qfSlots?'Yes':'No'])));
  lines.push('');
  lines.push(row(['MATCH RESULTS']));
  lines.push(row(['Match','Round','Team 1','T1 Judge Pts','T1 Fastest','T1 Winner','T1 Sig Bev','T1 Total','T1 Time','Team 2','T2 Judge Pts','T2 Fastest','T2 Winner','T2 Sig Bev','T2 Total','T2 Time','Result']));
  S.matches.filter(m=>m.done).forEach((m,i)=>{
    const p1=jPts1(m),p2=jPts2(m),aw1=p1>p2,aw2=p2>p1,v1=t1Tot(m),v2=t2Tot(m);
    const w=v1>v2?m.t1:v2>v1?m.t2:'Draw';
    lines.push(row(['M'+(i+1),RC[m.round].label,m.t1,p1,m.s1.fastest?'Yes':'No',aw1?'Yes':'No',m.s1.sigBev?'Yes':'No',v1,m.t1time||'',m.t2,p2,m.s2.fastest?'Yes':'No',aw2?'Yes':'No',m.s2.sigBev?'Yes':'No',v2,m.t2time||'',w]));
  });
  lines.push('');
  lines.push(row(['CUP-BY-CUP SCORES']));
  S.matches.filter(m=>m.done).forEach((m,i)=>{
    lines.push('');lines.push(row(['Match M'+(i+1),RC[m.round].label,m.t1+' vs '+m.t2]));
    lines.push(row(['Cup','Team 1 Tokens','Team 2 Tokens','Cup Total','Leader']));
    m.drinks.forEach((d,di)=>{const t=d[0]+d[1];lines.push(row(['D'+(di+1),d[0],d[1],t,d[0]>d[1]?m.t1:d[1]>d[0]?m.t2:t===0?'No tokens':'Tied']));});
    lines.push(row(['TOTALS',jPts1(m),jPts2(m),jPts1(m)+jPts2(m),'']));
  });
  const csv=lines.join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='BBTC_Results_'+(S.eventDate||new Date().toISOString().slice(0,10)).replace(/\s/g,'_')+'.csv';
  a.click();URL.revokeObjectURL(url);
}

function rBracket(){
  if(!S.bracket){
    const lb=calcPrelimLB();
    const prelims=S.matches.filter(m=>m.round==='preliminary');

    const canGen=S.teams.length>=2&&done>0;
    return '<div style="display:flex;flex-direction:column;gap:.75rem">'
      +'<div class="card"><div class="ch">Bracket Setup</div><div class="cb"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap"><div><label class="cf-lbl">Teams advancing from Preliminary</label><input id="qfs2" type="number" min="2" max="'+S.teams.length+'" value="'+S.qfSlots+'" style="width:80px;font-size:16px;font-weight:700"/></div><div style="flex:1"><p class="hint">'+(S.qfSlots>=8?'Full QF bracket (1v8, 3v6, 4v5, 2v7 → SF → Final)':S.qfSlots>=4?'SF bracket (1v4, 2v3 → Final)':'Direct Final (top 2 teams)')+'</p></div></div><div style="margin-top:.75rem;display:flex;align-items:center;gap:10px"><button class="btn-p" id="gen-bracket"'+(canGen?'':' disabled')+'>Generate Bracket</button>'+(canGen?'':'<span class="hint">Complete at least one preliminary match first.</span>')+'</div></div></div>';
  }
  const b=S.bracket;
  const slots=allBracketSlots();
  const slotCard=(slot)=>{
    const m=slot.matchId?S.matches.find(x=>x.id===slot.matchId):null;
    const seeds=slot.seeds||[];
    const picking=S.bracketPicking===slot.id;
    const v1=m&&m.done?t1Tot(m):null,v2=m&&m.done?t2Tot(m):null;
    const t1class=slot.winner&&slot.t1===slot.winner?' winner':slot.loser&&slot.t1===slot.loser?' loser':'';

    else if(slot.t1&&slot.t2&&picking){
      const jOk=S.bracketJids.length===3,maxJ=S.bracketJids.length>=3;
      footer='<div class="bjpick"><div class="bjpick-lbl">Select 3 judges ('+S.bracketJids.length+'/3)</div><div class="jpool" style="margin-bottom:8px">'+S.judges.map(j=>{const sel=S.bracketJids.includes(j.id),dim=maxJ&&!sel;return '<button class="jpill'+(sel?' on':'')+(dim?' dim':'')+'" data-bj="'+j.id+'"><div class="jpick"></div>'+j.name+'</button>';}).join('')+'</div><div style="display:flex;gap:8px"><button class="btn-p" id="start-bm-'+slot.id+'"'+(jOk?'':' disabled')+'>Start Scoring</button><button class="btn-o" id="cancel-bpick">Cancel</button></div></div>';
    }
    else if(!(slot.t1&&slot.t2)){footer='<div class="bslot-footer"><span class="bslot-status awaiting">⏳ Awaiting results…</span></div>';}
    return '<div class="bslot'+(m&&m.done?' done':slot.t1&&slot.t2&&!slot.matchId?' active':'')+'"><div class="bslot-hdr"><span>'+slot.label+'</span>'+(seeds.length?'<span style="font-size:10px;color:var(--txt3)">Seed '+seeds[0]+' vs Seed '+seeds[1]+'</span>':'')+'</div><div class="bslot-teams"><div class="bslot-team"><span class="bslot-seed">'+(seeds[0]||'?')+'</span><span class="bslot-name'+(slot.t1?t1class:' tbd')+'">'+(slot.t1||'TBD')+'</span>'+(v1!==null?'<span class="bslot-score">'+v1+'</span>':'')+'</div><div class="bslot-divider"></div><div class="bslot-team"><span class="bslot-seed">'+(seeds[1]||'?')+'</span><span class="bslot-name'+(slot.t2?t2class:' tbd')+'">'+(slot.t2||'TBD')+'</span>'+(v2!==null?'<span class="bslot-score">'+v2+'</span>':'')+'</div></div>'+footer+'</div>';
  };
  let out='<div style="display:flex;flex-direction:column;gap:1.25rem">';
  if(b.qf&&b.qf.length){out+='<div class="bracket-section"><div class="bracket-section-title">⚔️ Quarter Finals</div><div class="bracket-grid">'+b.qf.map(slotCard).join('')+'</div></div>';}
  if(b.sf&&b.sf.length){out+='<div class="bracket-section"><div class="bracket-section-title">🏅 Semi Finals</div><div class="bracket-grid">'+b.sf.map(slotCard).join('')+'</div></div>';}
  if(b.final){out+='<div class="bracket-section"><div class="bracket-section-title">🏆 Final</div><div class="bracket-grid">'+slotCard(b.final)+'</div></div>';}
  if(b.third){out+='<div class="bracket-section"><div class="bracket-section-title">🥉 3rd Place</div><div class="bracket-grid">'+slotCard(b.third)+'</div></div>';}
  out+='<button class="btn-o" id="gen-bracket" style="align-self:flex-start">↺ Regenerate Bracket</button>';
  out+='</div>';
  return out;
}

function rHistory(){
  const done=S.matches.filter(m=>m.done);
  if(!done.length)return '<div class="empty">No completed matches yet.</div>';
  return '<div style="display:flex;flex-direction:column;gap:8px">'+done.map(m=>{
    const v1=t1Tot(m),v2=t2Tot(m),w=v1>v2?1:v2>v1?2:0;
    return '<div class="hr-row"><div class="hr-rb">'+RC[m.round].label+'</div><div class="hr-t'+(w===1?' w':'')+'">'+m.t1+'</div><div class="hr-s" style="color:'+(w===1?'var(--am)':'var(--txt3)')+'">'+v1+'</div><div class="hvs">'+(w===0?'draw':'vs')+'</div><div class="hr-s" style="color:'+(w===2?'var(--bl)':'var(--txt3)')+'">'+v2+'</div><div class="hr-t'+(w===2?' w':'')+'" style="text-align:right">'+m.t2+'</div>'+((m.t1time||m.t2time)?'<div class="hr-time">⏱ <span style="color:var(--am)">'+(m.t1time||'—')+'</span> / <span style="color:var(--bl)">'+(m.t2time||'—')+'</span></div>':'')+'</div>';
  }).join('')+'</div>';
}

function rStandings(){
  const lb=calcPrelimLB();
  if(!lb.length)return '<div class="empty">Add teams in Setup.</div>';
  const noScores=!S.matches.filter(m=>m.done&&m.round==='preliminary').length;
  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:.85rem"><span style="font-size:15px;font-weight:700">Preliminary Standings</span><div style="margin-left:auto;display:flex;align-items:center;gap:8px"><label style="font-size:12px;color:var(--txt3);font-weight:600">QF spots:</label><input id="qfs" type="number" min="2" max="'+lb.length+'" value="'+S.qfSlots+'" style="width:60px;text-align:center;font-size:16px;font-weight:700"/></div></div>'+(noScores?'<p class="hint" style="margin-bottom:10px">Complete preliminary matches to see standings.</p>':'')+'<div style="display:flex;flex-direction:column;gap:7px">'+lb.map((s,i)=>{
    const isQF=(i+1)<=S.qfSlots,showCut=i===S.qfSlots-1&&S.qfSlots<lb.length;
    return '<div class="lb-row'+(isQF?' qf':'')+'"><div class="rnk '+(i===0?'r1':i===1?'r2':i===2?'r3':'ro')+'">'+(i+1)+'</div><div class="lb-name">'+s.t+'</div>'+(s.played>0?'<div class="lb-rec">'+s.wins+'W / '+(s.played-s.wins)+'L<span>'+s.played+' played</span></div>':'<div class="lb-rec" style="color:var(--txt3)">—<span>no matches</span></div>')+'<div class="lb-pts"><div class="lb-pn">'+s.pts+'</div><div class="lb-pl">pts</div></div>'+(isQF?'<div class="qf-tag">QF ✓</div>':'<div style="width:48px"></div>')+'</div>'+(showCut?'<div class="cutline">QF cut — top '+S.qfSlots+' advance</div>':'');
  }).join('')+'</div>';
}

function rScoring(){
  const m=S.matches.find(x=>x.id===S.sid);
  if(!m)return '';
  const cfg=RC[m.round];
  const used=tokUsed(m),maxT=cfg.maxJ,p1=jPts1(m),p2=jPts2(m);
  const autoWin1=p1>p2,autoWin2=p2>p1;
  const t1n=m.t1.length>18?m.t1.slice(0,16)+'…':m.t1;
  const t2n=m.t2.length>18?m.t2.slice(0,16)+'…':m.t2;
  const grid=m.drinks.map((row,di)=>{
    const t1v=row[0],t2v=row[1];
    const t1b=[0,1,2,3].map(v=>'<button class="sb'+(t1v===v?' a-on':'')+'" data-di="'+di+'" data-tn="1" data-v="'+v+'"'+(v+t2v>3?' disabled':'')+'>'+v+'</button>').join('');
    const t2b=[0,1,2,3].map(v=>'<button class="sb'+(t2v===v?' b-on':'')+'" data-di="'+di+'" data-tn="2" data-v="'+v+'"'+(v+t1v>3?' disabled':'')+'>'+v+'</button>').join('');
    return '<div class="scu-row"><div class="dl">D'+(di+1)+'</div><div><div class="btn-grp">'+t1b+'</div></div><div><div class="btn-grp">'+t2b+'</div></div></div>';
  }).join('');
  const manualBonuses=[{key:'fastest',label:'Fastest team',pts:2},...(!isPre(m.round)?[{key:'sigBev',label:'Signature beverage',pts:2}]:[])];
  const bonusPanel=tn=>{
    const k=tn===1?'s1':'s2',nm=tn===1?m.t1:m.t2,c=tn===1?'t1':'t2',aw=tn===1?autoWin1:autoWin2;
    return '<div class="sc-bp"><div class="sc-bp-h '+c+'">'+nm+'</div><div class="sc-bp-b"><div class="brow auto'+(aw?' on':'')+' '+c+'" style="opacity:'+(aw?1:.35)+'"><div class="chk'+(aw?' on':'')+' '+c+'"></div><span class="bn">Round winner <span style="font-size:10px;color:var(--txt3)">(auto)</span></span><span class="bpts-'+c+'">+5</span></div>'+manualBonuses.map(b=>'<div class="brow'+(m[k][b.key]?' on':'')+' '+c+'" data-tn="'+tn+'" data-bn="'+b.key+'"><div class="chk'+(m[k][b.key]?' on':'')+' '+c+'"></div><span class="bn">'+b.label+'</span><span class="bpts-'+c+'">+'+b.pts+'</span></div>').join('')+'</div></div>';
  };
  return '<div class="sc-hdr"><button class="btn-o" id="back">← Back</button><div style="flex:1"><span style="font-size:15px;font-weight:700">'+m.t1+' <span style="font-weight:400;color:var(--txt3)">vs</span> '+m.t2+'</span></div><div class="badge">'+cfg.label+' · '+cfg.drinks+' drinks</div></div>'
  +'<div class="sc-meta"><div class="sc-time-box"><div class="sc-time-lbl t1">'+t1n+' — Time</div><input id="t1time" type="text" value="'+m.t1time+'" placeholder="e.g. 8:42"/></div><div class="sc-time-box"><div class="sc-time-lbl t2">'+t2n+' — Time</div><input id="t2time" type="text" value="'+m.t2time+'" placeholder="e.g. 9:10"/></div><div class="sc-tok'+(used>maxT?' warn':'')+'"><div style="font-size:19px;font-weight:700;line-height:1.1">'+used+'/'+maxT+'</div><div style="font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;font-weight:700">tokens</div></div></div>'
  +'<div class="scu-wrap"><div class="scu"><div class="scu-hdr-row"><div class="dl"></div><div class="h1">'+t1n+'</div><div class="h2">'+t2n+'</div></div><div class="scu-body" id="sg-scroll">'+grid+'</div><div class="scu-tot-row"><div class="dl">Total</div><div class="t1v">'+p1+'</div><div class="t2v">'+p2+'</div></div></div></div>'
  +'<div class="sc-bonuses">'+bonusPanel(1)+bonusPanel(2)+'</div>'
  +'<div class="sc-tots"><div class="sc-tot"><div class="sc-tot-name">'+m.t1+'</div><div class="sc-tot-n t1">'+t1Tot(m)+'</div><div class="sc-tot-sub">pts</div></div><div style="font-size:14px;color:var(--txt3);font-weight:700">vs</div><div class="sc-tot"><div class="sc-tot-name">'+m.t2+'</div><div class="sc-tot-n t2">'+t2Tot(m)+'</div><div class="sc-tot-sub">pts</div></div></div>'
  +'<div style="display:flex;justify-content:center;padding:1.25rem 1.5rem 2rem"><button class="btn-p" id="fin" style="padding:11px 36px;font-size:15px">✓  Finalise match</button></div>';
}

/* ── Bind ── */
function bind(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};

  // Overlays
  on('homebtn','click',()=>{window.location.href='../index.html';});
  on('pubview','click',()=>showAudience());
  on('aud-close','click',()=>document.getElementById('aud-overlay').classList.remove('show'));
  on('exportbtn','click',()=>generatePDF());
  on('pdf-close','click',()=>document.getElementById('pdf-overlay').classList.remove('show'));
  on('pdf-print','click',()=>window.print());
  on('csvbtn','click',()=>generateCSV());

  // Timer
  on('tmrbtn','click',()=>document.getElementById('tmr-overlay').classList.add('show'));
  on('tmr-close','click',()=>document.getElementById('tmr-overlay').classList.remove('show'));
  on('tmr-fs','click',()=>document.getElementById('tmr-overlay').classList.toggle('fs'));
  document.querySelectorAll('[data-secs]').forEach(b=>b.addEventListener('click',()=>{
    if(TMR.running){clearInterval(TMR.iv);TMR.running=false;}
    document.getElementById('tmr-overlay').classList.remove('running','done');
    TMR.ms=+b.dataset.secs*1000;TMR.preset=+b.dataset.secs;
    document.getElementById('tmr-display').textContent=fmtTime(TMR.ms);
    document.querySelectorAll('[data-secs]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  }));
  on('tmr-start','click',()=>{
    if(TMR.running||TMR.ms<=0)return;
    document.getElementById('tmr-overlay').classList.add('running');
    document.getElementById('tmr-overlay').classList.remove('done');
    TMR.running=true;
    TMR.iv=setInterval(()=>{
      TMR.ms-=100;
      document.getElementById('tmr-display').textContent=fmtTime(TMR.ms);
      if(TMR.ms<=0){clearInterval(TMR.iv);TMR.running=false;TMR.ms=0;document.getElementById('tmr-overlay').classList.remove('running');document.getElementById('tmr-overlay').classList.add('done');}
    },100);
  });
  on('tmr-pause','click',()=>{if(!TMR.running)return;clearInterval(TMR.iv);TMR.running=false;document.getElementById('tmr-overlay').classList.remove('running');});
  on('tmr-reset','click',()=>{clearInterval(TMR.iv);TMR.running=false;TMR.ms=TMR.preset*1000;document.getElementById('tmr-display').textContent=fmtTime(TMR.ms);document.getElementById('tmr-overlay').classList.remove('running','done');});

  // Reset
  on('resetbtn','click',()=>{if(confirm('Reset ALL competition data? This cannot be undone.')){localStorage.removeItem(STORE_KEY);mid=0;jid=0;S={judges:[],teams:[],matches:[],bracket:null,tab:'setup',sid:null,creating:false,bracketPicking:null,bracketJids:[],nm:{t1:'',t2:'',round:'preliminary',jids:[]},qfSlots:8,eventDate:'',eventVenue:''};render();}});

  // Tabs
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;render();}));

  // Event info
  const evdate=$('evdate'),evvenue=$('evvenue');
  if(evdate)evdate.addEventListener('input',()=>{S.eventDate=evdate.value;saveState();});
  if(evvenue)evvenue.addEventListener('input',()=>{S.eventVenue=evvenue.value;saveState();});

  // QF slots (standings)
  const qfs=$('qfs');
  if(qfs)qfs.addEventListener('change',()=>{S.qfSlots=Math.max(2,+qfs.value||2);render();});
  // QF slots (bracket setup)
  const qfs2=$('qfs2');
  if(qfs2)qfs2.addEventListener('change',()=>{S.qfSlots=Math.max(2,+qfs2.value||2);saveState();render();});

  // Teams
  const addTeam=()=>{const inp=$('tinp');if(!inp)return;const t=inp.value.trim();if(t&&!S.teams.some(x=>x.toLowerCase()===t.toLowerCase())){S.teams.push(t);inp.value='';render();}else inp.value='';};
  on('addt','click',addTeam);on('tinp','keydown',e=>e.key==='Enter'&&addTeam());
  document.querySelectorAll('[data-rmt]').forEach(b=>b.addEventListener('click',()=>{S.teams=S.teams.filter(t=>t!==b.dataset.rmt);render();}));

  // Judges
  const addJudge=()=>{const inp=$('jinp');if(!inp)return;const n=inp.value.trim();if(n&&!S.judges.some(j=>j.name.toLowerCase()===n.toLowerCase())){S.judges.push({id:String(jid++),name:n});inp.value='';render();}else inp.value='';};
  on('addj','click',addJudge);on('jinp','keydown',e=>e.key==='Enter'&&addJudge());
  document.querySelectorAll('[data-rmj]').forEach(b=>b.addEventListener('click',()=>{S.judges=S.judges.filter(j=>j.id!==b.dataset.rmj);render();}));

  // Create prelim match form
  on('showCF','click',()=>{S.creating=true;S.nm={t1:'',t2:'',round:'preliminary',jids:[]};render();});
  on('cancelCF','click',()=>{S.creating=false;render();});
  const s1=$('sel1'),s2=$('sel2');
  if(s1)s1.addEventListener('change',()=>{S.nm.t1=s1.value;if(S.nm.t2===S.nm.t1)S.nm.t2='';render();});
  if(s2)s2.addEventListener('change',()=>{S.nm.t2=s2.value;render();});
  document.querySelectorAll('[data-jp]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.jp,sel=S.nm.jids.includes(id);S.nm.jids=sel?S.nm.jids.filter(x=>x!==id):S.nm.jids.length<3?[...S.nm.jids,id]:S.nm.jids;render();}));
  on('doCF','click',()=>{S.matches.push({id:String(mid++),round:'preliminary',t1:S.nm.t1,t2:S.nm.t2,jids:[...S.nm.jids],...mkMatch(15),done:false});S.creating=false;S.nm={t1:'',t2:'',round:'preliminary',jids:[]};render();});

  // Generate bracket
  on('gen-bracket','click',()=>{generateBracket();S.tab='bracket';render();});

  // Bracket: start match (open judge picker)
  document.querySelectorAll('[data-bpick]').forEach(b=>b.addEventListener('click',()=>{S.bracketPicking=b.dataset.bpick;S.bracketJids=[];render();}));
  on('cancel-bpick','click',()=>{S.bracketPicking=null;S.bracketJids=[];render();});

  // Bracket judge pills
  document.querySelectorAll('[data-bj]').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.bj,sel=S.bracketJids.includes(id);S.bracketJids=sel?S.bracketJids.filter(x=>x!==id):S.bracketJids.length<3?[...S.bracketJids,id]:S.bracketJids;render();}));

  // Bracket: actually start match after judges picked
  if(S.bracketPicking){
    on('start-bm-'+S.bracketPicking,'click',()=>{createBracketMatch(S.bracketPicking,S.bracketJids);});
  }

  // Open match for scoring (from matches or bracket)
  document.querySelectorAll('[data-sid]').forEach(b=>b.addEventListener('click',()=>{S.sid=b.dataset.sid;render();}));

  // Scoring: back + finalise
  on('back','click',()=>{S.sid=null;render();});
  on('fin','click',()=>{
    const m=S.matches.find(x=>x.id===S.sid);
    if(m){m.done=true;updateBracketAfterMatch(m.id);}
    S.sid=null;
    S.tab=m?(m.bracketSlot?'bracket':'prelims'):'prelims';
    render();
  });

  // Time inputs
  const t1t=$('t1time'),t2t=$('t2time');
  if(t1t)t1t.addEventListener('input',()=>{const m=S.matches.find(x=>x.id===S.sid);if(m){m.t1time=t1t.value;saveState();}});
  if(t2t)t2t.addEventListener('input',()=>{const m=S.matches.find(x=>x.id===S.sid);if(m){m.t2time=t2t.value;saveState();}});

  // Score buttons
  document.querySelectorAll('[data-v][data-tn][data-di]').forEach(btn=>btn.addEventListener('click',()=>{
    const di=+btn.dataset.di,tn=+btn.dataset.tn,v=+btn.dataset.v;
    const sc=document.getElementById('sg-scroll')?.scrollTop||0;
    const m=S.matches.find(x=>x.id===S.sid);if(!m)return;
    m.drinks[di][tn===1?0:1]=v;render();
    const sg=document.getElementById('sg-scroll');if(sg)sg.scrollTop=sc;
  }));

  // Bonus toggles
  document.querySelectorAll('[data-bn]').forEach(el=>el.addEventListener('click',()=>{
    const tn=+el.dataset.tn,bn=el.dataset.bn;
    const m=S.matches.find(x=>x.id===S.sid);if(!m)return;
    const k=tn===1?'s1':'s2',ok=tn===1?'s2':'s1';
    const nv=!m[k][bn];if(bn==='fastest'&&nv)m[ok][bn]=false;
    m[k][bn]=nv;render();
  }));

  // Demo
  on('load-demo','click',()=>{
    if(confirm('Load demo data? This will replace your current data.')){
      loadBBTCDemo();render();
    }
  });
}

render();
</script>
</body>
</html>
